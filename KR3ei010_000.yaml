front:
  text: 王序堯封沈氏所著醫經讀傷寒論讀簡明切當允為善本尚有女科輯要一書世罕傳本原稿為餘外舅徐虹橋先生補注珍藏先生早歸道山余授室後得見其書頗多入理深談發前人所未發者今年楊素園明府聞有此稿命為借抄余謂婦兄友珊曰君子之孝也亦務其大者遠者而已寶守遺編莫若傳諸不朽友珊許焉愛不揣鄙佇稍加參訂而公諸世云道光庚戌仲冬棘人王士雄書於潛齊
