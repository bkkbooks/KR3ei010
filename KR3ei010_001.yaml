body:
  text: 卷上第一節經水素問云女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下沈堯封曰天癸是女精由任脈而來月事是經血由太衝而來經言二七而天癸至緣任脈通斯時太衝脈盛月事亦以時下一順言之一逆言之耳故月事不來不調及崩是血病咎在衝脈衝脈隸陽明帶下是精病咎在任脈任脈隸少陰蓋身前中央一條是任脈背後脊裡一條是督脈皆起於前後兩陰之交會陰穴難經明晰靈素傳誤帶脈起於季脅似束帶狀人精藏於腎腎繫於腰背精欲下泄必由帶脈而前然後從任脈而下故經言任脈為病女子帶下王孟英按俞東扶云經言男子二八而腎氣盛天癸至精氣溢瀉若天癸即月水丈夫有之乎蓋男女皆有精易謂男女構精可據然指天癸為精亦不妥天癸為精不當又云精氣溢瀉矣後賢講受孕之道有陽精陰血先至後沖等説亦謬夫男女交接曾見女人有血出耶交接出血是病豈能裹精及為精所裹哉大約兩情酣暢百脈齊到天癸與男女之精偕至斯入任脈而成胎耳男胎女胎則由夫婦之天癸有強弱盈虛之不同也吾友徐亞枝曰如沈氏説一若天癸即精者如俞氏説一若血與精之外別有一物所謂天癸者竊謂天癸者指腎水本體而言癸者水也腎為水臟天一生水故謂腎水為天癸至謂至極也猶言足也女子二七男子二八腎氣始盛而腎水乃足蓋人身五臟惟腎生最先而腎足最遲腎衰獨早故孩提能悲能喜能怒能思而絶無欲念其有情竇早開者亦在腎氣將盛天癸將至之年可見腎氣未盛癸水未足則不生欲念也逮腎氣衰癸水絶則欲念自泯矣解此段經文者當云女子二七而腎水之本體充足任脈乃通太衝之脈始盛月事因而時下矣夫前陰二竅溺之由水竅者無論矣其由精竅者皆原於天癸者也月水雖從衝脈下謂為天癸之常可也泄精成孕是任脈之施受謂為天癸之能可也帶下乃任脈之失其擔任謂為天癸之病可也然則稱月水為天癸似亦無不可也前賢解此皆重讀上二字而略下一字惟將至字當作來字看遂致議論紛紜耳王冰曰男以氣運故陽氣應日而一舉女以血滿故陰血從月而一下第二節月事不調素問云天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起卒讀猝然之猝褚澄曰女子天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫或雖合而難子合多則瀝枯虛人産乳衆則血枯殺人王孟英按此論甚不盡然存其意可也惟産乳衆而血枯至死者頗多然吾鄉吳醞香大令徐夫人半産三次不計外凡生十男四女並已長成而夫人年逾五旬精力不衰猶能操家政而撫馭群下也至死今石印本王氏十四種作卒死非是方約之曰婦人不得自專每多忿怒氣結則血亦枯王孟英按此至言也氣為血帥故調經必先理氣然理氣不可徒以香燥也蓋鬱怒為情志之火頻服香燥則營陰愈耗矣趙養葵曰經水不及期而來者有火也宜六味丸滋水如不及期而來多者加白芍柴胡海螵蛸如半月或十日而來且綿延不止者屬氣虛宜補中湯如過期而來者火衰也六味加艾葉如脈遲而色淡者加桂此其大略也其間有不及期而無火者有過期而有火者不可拘於一定當察脈視稟滋水為主隨證加減王孟英按婦人之病雖以調經為先第人稟不同亦如其面有終身月汛不齊而善於生育者有經期極準而竟不受孕者雄於女科閲歷多年見聞不少始知古人之論不可盡泥無妄之藥不可妄施也第三節辨色及病趙養葵曰衝任藏精系胞又恃一點命門之火為之主宰火旺則紅火衰則淡火太旺則紫火太衰則白所以滋水更當養火甚有乾枯不通者雖曰火盛之極亦不宜以苦寒藥降火只宜大補其水從天一之源以養之使滿又曰紫與黑者多屬火旺亦有虛寒而黑色者不可不察若淡白則無火明矣沈堯封曰王宇泰以寒則凝既行而紫黑定非寒證然投熱藥十中嘗見一二色白無火亦屬近理然間有不宜補火者嘗見元和一婦經水過期十日方至色淡穩婆據此投肉桂藥數劑經水來多遍身發黃不能飲食身熱脈數竟成危候此是丹溪所謂經水淡白屬氣虛一證要之臨證時須細察脈象復參旁證方識虛實寒熱倘有疑似證中有兩説者先用其輕劑如色淡一證先用補氣法不效再投補火庶幾無誤録葉氏之説於下葉氏曰血黑屬熱此其常也亦有風寒外束者十中嘗見一二蓋寒主收引小腹必常冷痛經行時或手足厥冷唇青面白尺脈遲或微而虛或大而無力熱則尺脈洪數或實而有力參之脈證為的王孟英按色淡竟有屬熱者古人從未道及須以脈證互勘自得但不可作實熱論而瀉以苦寒也更有奇者方氏婦産後經色漸淡數年後竟無赤色且亦結塊平常亦無帶下人日尪羸余診之脈軟數口苦而時有寒熱與青蒿白薇黃柏柴胡當歸鱉甲龜版芍藥烏鰂骨杞子地骨皮等出入為方服百劑而痊此僅見之證矣滑伯仁曰經前臍腹絞痛寒熱交作下如黑豆汁兩尺脈澀余皆弦急此寒濕搏於衝任寒濕生濁下如豆汁與血交爭故痛宜辛散苦溫血藥徐藹輝曰辛散血藥是川芎之類苦溫血藥是艾葉之類李氏曰經水帶黃混濁者濕痰也丹溪曰經將行而痛者氣之滯也用香附青皮桃仁黃連或用抑氣散四物加玄胡丹皮條芩又曰經將來腹中陳痛乍作乍止者血熱氣實也四物加川連丹皮徐藹輝曰抑氣散出嚴氏系香附四兩陳皮一兩茯神炙草一兩半也為末每服二錢治婦人氣盛於血變生諸證頭暈膈滿取內經高者抑之之義汪訒庵謂是方和平可用若補血以平陽火亦正治也丹溪又曰經後作痛者氣血俱虛也宜八珍湯丹溪又曰成塊者氣之凝也沈堯封曰經前腹痛必有所滯氣滯脈必沉寒滯脈必緊濕滯脈必濡兼寒兼熱當參旁證至若風邪由下部而入於脈中亦能作痛其脈乍大乍小有時隆起葉氏用防風荊芥桔梗甘草虛者加人參各一錢焙黑取其入血分研末酒送神效堯封又曰經前後俱痛病多由肝經而其中更有不同脈弦細者是木氣之郁宜逍遙散及川楝小茴香橘核之類脈大者是肝風內動體發紅塊者是肝陽外越俱宜溫潤戴禮亭室人向患經前後腹痛連及右足體發紅塊脈大右關尺尤甚己卯秋豫作肝風內動治用生地四錢炒枸杞一錢細石斛二錢杜仲二錢干淡蓯蓉一錢麥冬一錢牛膝一錢歸身一錢五分炒白芍一錢服之痛止後於經前後服數劑經來甚適不服即痛因作丸服此方屢用有驗第四節經行聲啞及目暗泄瀉帶下等證沈堯封曰經來聲荀證苟恆大兄長女嫁斜塘倪姓早寡體氣虛弱每逢月事聲音必啞豫用天冬地黃蓯蓉歸身等藥病益甚張口指畫毫無一字可辨即於此方加細辛少許以通少陰之絡藥才入口其聲即出十餘劑後桂附八味丸調理永不發撮要云經後目暗屬血虛汪石山曰經行泄瀉屬脾虛多濕宜參苓白朮散王孟英按亦有肝木侮土者繆氏曰經行白帶屬陽虛下陷用參術助陽之藥王孟英按亦有鬱火內盛者第五節月事不來素問云二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治沈堯封曰二陽指陽明經言不指臟腑言二陽之病發心脾者陽明為多血之經血乃水穀之精氣借心火鍛鍊而成憂愁思慮傷心因及其子不嗜飲食血無以資生陽明病矣經云前陰總宗筋之所會會於氣街而陽明為之長故陽明病則陽事衰而不得隱曲也太衝為血海並陽明之經而行故陽明病則衝脈衰而女子不月也王孟英按經水固以月行為常然陰虛者多火經每先期陰愈虛行愈速甚至旬日半月而一行更有血已無多而猶每月竭蹶一行者其涸也可立而待也若血雖虛而火不甚熾汛必愆期此含蓄有權雖停止一二年或竟斷絶不行但其脈不甚數者正合坤主吝嗇之道皆可無慮昧者不知此理而但憑月事以分病之輕重聞其不行輒欲通之竭澤而漁不仁甚矣金匱云婦人病因虛積冷結氣經水斷絶張景嶽曰經閉有血隔血枯之不同隔者病於暫通之則愈枯者其來也漸補養乃充沈堯封曰金匱三證積冷結氣有血不行也景嶽謂之血隔積冷宜用肉桂大辛熱之藥導血下行後用養榮之藥調之結氣宜宣如逍遙散或烏藥香附行氣之品宣之虛者無血可行也景嶽謂之血枯宜補趙養葵補水補火補中氣三法最為扼要王孟英按補水勿泥於六味補火勿泥於八味補中氣勿泥於歸脾附録魏玉璜一貫煎方治肝腎陰虛氣滯不運脅肋攻痛胸腹䐜脹脈反細弱或虛弦舌無津液喉嗌乾燥者沙參麥冬生地歸身杞子川楝子口苦燥者加酒炒川連附録集靈膏方從王秉衡重慶堂隨筆人生五十陰氣先衰老人陰虧者多此方滋養真陰柔和筋骨西洋參取結實壯大者刮去皮飯上蒸九次日中曬九次甘杞子懷牛膝酒蒸天冬麥冬懷生地懷熟地仙靈脾八味等分熬成膏白湯或溫酒調服附録滋水清肝飲方高鼓峰治陰虛肝氣鬱窒胃脘痛脅痛脈虛弦或細軟舌苔光滑鮮紅者方即六味地黃湯加歸身白芍柴胡山梔大棗附録薛一瓢滋營養液膏方女貞子旱蓮草霜桑葉黑芝麻黃甘菊枸杞子當歸身白芍藥熟地黃黑大豆南燭葉白茯神葳蕤橘紅沙苑蒺藜炙甘草天泉水熬濃汁入黑驢皮膠白蜜煉收附録薛一瓢心脾雙補丸方西洋參蒸透白朮蒸熟茯神甘草生地黃丹參棗仁遠志肉北五味麥門冬玄參柏子仁黃連香附制川貝母桔梗龍眼肉附録陸九芝坎離丸方論九芝封翁世補齋文曰坎離丸者山右閻誠齋觀察取作種子第一方最易最簡最為無弊方乃紅棗黑豆等分紅棗色赤入心取其肉厚者蒸熟去皮核黑豆色黑入腎即大黑豆非馬料豆用桑椹汁浸透亦於飯鍋內蒸之蒸熟再浸再蒸二味合搗令如泥糊為丸或印成餅隨宜服食亦能烏鬚髮壯筋骨以此種玉其胎自固而子亦多壽壬午夏曾以此方貢于徐侍郎頌閣入之便賤驗方中世之專事補陽而用硫附輩者慎不可從如果陽道不起不能堅久精薄無子還是鹿茸尚為血肉有情之品然亦須同二冬二地及黃柏一味大補其陰則男婦皆可服此亦誠齋之説也寇宗奭曰童年情竇早開積想在心月水先閉蓋憂愁思慮則傷心心傷則血耗竭故經水閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作則水氣竭故四肢干木氣不充故多怒髮鬢焦筋痿五臟以次傳遍故猝不死而終死也比於諸勞最為難治沈堯封曰此條亦從金匱虛字內分出實有是證但此所願不得相火必熾非補水無以制之六味地黃湯補陰瀉陽固是妙法然脾虛食減倘嫌地黃膩膈炒鬆可也不然以女貞易之顧名思義並瀉相火王孟英按此證最難治六味礙脾歸脾助火惟薛一瓢滋營養液膏加小麥大棗遠志庶幾合法一瓢又有心脾雙補丸亦可酌用樓全善曰經閉有汙血凝滯胞門一證羅謙甫血極膏一味大黃為末醋熬成膏服之利一二行經血自下是婦科仙藥沈堯封曰金匱論經閉有冷無熱非闕文也蓋天暑地熱則經水沸溢豈反有凝泣不來之理潔古東垣降心火瀉三焦之説不可盡信即骨蒸內熱亦屬陰虧非同實火之可寒而愈王孟英按王子亨全生指速方地黃煎以生地汁八兩熬耗一半內大黃末一兩同熬候可丸丸如梧子大熟水下五粒未效加至十粒治女子氣竭傷肝月事不來病名血枯蓋瘀血不去則新血枯也即內經烏鰂蘆茹丸仲景大黃蟅蟲丸之義後人但知彼血枯為血虛而不知血得熱則瘀反用溫補豈能愈此血枯之病堯封亦為此論毋乃欠考朱丹溪曰肥人痰塞胞門宜厚朴二陳湯第六節淋漓不斷一名經漏陳良甫曰或因氣虛不能攝血或因經行而合陰陽外邪客於胞內王孟英按亦有因血熱而不循其常度者第七節月事異常經云七七而天癸竭有年過五旬經行不止者許叔微主血有餘不可止宜當歸散産寶主勞傷過度喜怒不時李時珍作敗血論三説不同當參脈證李時珍曰月事一月一行其常也或先或後或通或塞其病也有行期只吐血衄血或眼耳出血是謂倒經有三月一行是謂居經有一年一行是謂避年有一生不行而受胎者是謂暗經有受胎後月月行經而産子者是謂胎盛俗名胎垢有受胎數月血忽大下而胎不隕者是謂漏胎此雖以氣血有餘不足言而亦異常矣王孟英按有未及二七之年而經水已行者有年逾花甲而月事不絶者有無病而偶停數月者有壯年而月信即斷者有帶下過甚而經不行者有數月而一行者有産後自乳而仍按月行經者有一産而停經一二年者秉賦不齊不可以常理概也第八節血崩血大至曰崩此是急病素問云陰虛陽搏謂之崩許叔微曰經云天暑地熱經水沸溢又曰陰虛者尺脈虛浮陽搏者寸脈弦急是陰血不足陽邪有餘故為失血內崩宜奇效四物湯或四物湯加黃連奇效四物湯當歸酒洗川芎白芍炒熟地黃阿膠艾葉黃芩炒各一錢叔微又曰女人因氣不先理然後血脈不順生崩帶等證香附是婦人仙藥醋炒為末久服為佳每服二錢清米飲調下徐朝奉內人遍藥不效服此獲安徐藹輝曰叔微理氣二字專主怒氣鬱氣傷肝故用香附調氣以和肝慎不可用破氣藥薛立齋曰肝經風熱或怒動肝火俱宜加味逍遙散加味逍遙散當歸白芍柴胡甘草茯苓白朮丹皮黑山梔加薄荷薑棗煎李太素曰崩宜理氣降火升提金匱云寸口脈微而緩微者衛氣疏疏則其膚空緩者胃弱不實則谷消而水化谷入於胃脈道乃行水入於經其血乃成營盛則其膚必疏三焦絶經名曰血崩趙養葵曰氣為陽主升血為陰主降陽有餘則升者勝血出上竅陽不足則降者勝血出下竅氣虛者面色必白尺脈虛大東垣曰下血證須用四君子補氣藥收功東垣又曰人傷飲食醫多妄下清氣下陷濁氣不降乃生䐜脹所以胃脘之陽不能升舉其氣陷下致崩宜補中湯丹溪云有涎郁胸中清氣不升故經脈壅遏而降下非開涎不足以行氣非氣升則血不能歸隧道其證或腹滿如孕或臍腹療痛或血結成片或血出則快止則悶或臍上動治宜開結痰行滯氣消汙血沈堯封曰沖為血海並陽明之經而行故東垣丹溪皆主胃脘之陽不升顧其病源各異李曰妄下朱曰痰鬱有腹滿如孕血出反快止反悶等證可認妄下則無有也非問不得戴元禮曰血大至曰崩或清或濁或純下紫血勢不可止有崩甚腹痛人多疑惡血未盡又見血色紫黑愈信為惡血不敢止截凡血之為患欲出未出之際停在腹中即成紫血以紫血為不可留又安知紫血之不為虛寒乎瘀而腹痛血行則痛止崩而腹痛血止則痛止芎歸湯加薑附止其血而痛自止薛立齋曰有婦患崩過服寒藥脾胃久虛中病未已寒病復起煩渴引飲粒米不進昏憒時作脈洪大按之微弱此無根之火內虛寒而外假熱也十全大補加附子崩減日服八味丸而愈又有久患崩服四物湯涼血劑或作或止有主降火加腹痛手足厥冷此脾胃虛寒所致先用附子理中湯次用濟生歸脾補中益氣二湯崩頓止若泥痛無補法誤矣沈堯封曰崩證熱多寒少若血大至色赤者是熱非寒倘色紫黑者出絡而凝其中有陽虛一證經云陽氣者衛外而為固也營行脈中衛行脈外脈外之陽虛失於衛護則脈中之營血漏泄既出絡脈凝而不流漸漸變紫變黑然必須少腹惡寒方可投溫崩證極驗方地榆生牡蠣各二錢生地四錢生白芍三錢黃芩丹皮各一錢半川連五分甘草八分炒蓮鬚黑梔各一錢水煎服沈堯封曰一婦日服人參阿膠血不止投此即效因伊帶多偶以苦參易芩血復至用芩即止去連血又至加連即止堯封又曰一婦患崩月餘余診時大崩發暈幾脫是方加人參一錢服之即完十劑而安堯封又曰一婦患此年逾五旬投人參阿膠不效一日用黃連五分甚不相安一醫云是氣病用酒炒香附歸芍丹皮黃芩牡蠣棗仁黑荊芥各二錢鬱金一錢五分橘皮一錢上沉香磨沖三分柴胡五分棕櫚炭八分煎服一劑崩止除柴胡荊芥棕炭數劑食進復加白朮為散服之作脹減去即安堯封又曰一崩證少腹惡寒用附桂八味丸收全效王孟英按經漏崩淋並由精竅出惟溺血從溺竅而下婦女雖自知然赧於細述醫者不知分辨往往誤治更有因病汛愆而衝脈之血改從大腸而下者人亦但知為便血也臨證均須細審第九節帶下與男子遺濁同治素問云任脈為病男子內結七疝女子帶下瘕聚又云脾傳之腎名曰疝瘕小腹冤結而痛出白名曰蠱又云少腹冤熱溲出白液又云思想無窮所願不得意淫於外入房太甚發為白淫沈堯封曰帶下有主風冷入於脬絡者巢元方孫思邈嚴用和楊仁齋樓全善諸人是也有主濕熱者劉河間張潔古張戴人羅周彥諸人是也有主脾虛氣虛者趙養葵薛立齋諸人是也有主濕痰者丹溪是也有主脾腎虛者張景嶽薛新甫是也又有主木鬱地中者方約之繆仲淳是也其所下之物嚴主血不化赤而成張主血積日久而成劉主熱極則津液溢出其治法有用大辛熱者有用大苦寒者有用大攻伐者有用大填補者雖立論制方各有意義然其所下之物究竟不知為何物惟丹溪云婦人帶下與男子夢遺同顯然指著女精言千古疑竇一言道破但精滑一證所因不同惜其所制之方囿於痰火二字中耳由是言之白帶即同白濁赤帶即同赤濁此皆滑膩如精者至若狀如米泔或臭水不黏者此乃脾家之物氣虛下陷使然高年亦有患此非精氣之病不可混治堯封又曰戴元禮論赤濁云精者血之所化有濁去太多精化不及赤未變白故成赤濁此虛之甚也何以知之有人天癸未至強力好色所泄半精半血若溺不赤無他熱證縱見赤濁不可以赤為熱只宜以治白濁法治之觀此則以赤帶為熱者謬矣王孟英按帶下女子生而即有津津常潤本非病也故扁鵲自稱帶下醫即今所謂女科是矣金匱亦以三十六病隸之帶下但過多即為病濕熱下注者為實精液不守者為虛苟體強氣旺之人雖多亦不為害惟乾燥則病甚蓋營津枯涸即是虛勞凡汛愆而帶盛者內熱逼液而不及化赤也並帶而枯燥全無者則為乾血勞之候矣匯而觀之精也液也痰也濕也血也皆可由任脈下行而為帶然有虛寒有虛熱有實熱三者之分治遺精亦然而虛寒較少故天士治帶必以黃柏為佐也妙香散治脈小食少或大便不實者龍骨益智仁人參各一兩白茯苓遠志去骨茯神去木各五錢硃砂二錢五分炙甘草錢半為末每服酌用數錢地黃飲子去桂附腎陰不足肝陽內風鼓動而滑精其脈弦大者宜之葉天士云天地溫和風濤自息又云坎中陽微下焦失納又云肝為剛藏不宜溫藥只宜溫柔養之水制熟地八錢川石斛麥冬茯苓各一錢五分石菖蒲遠志肉巴戟肉干淡蓯蓉各一錢五味子山萸肉沈堯封曰末二味酸藥可去補腎陰清肝陽方王宇泰曰腎為陰主藏精肝為陽主疏泄故腎之陰虛則精不藏肝之陽強則氣不固藕節青松葉側柏葉各一斤生地玉竹天冬各八兩女貞子旱蓮草各四兩熬膏服沈堯封曰此方以清芬之品清肝不以苦寒之藥傷氣八味丸戴元禮曰有赤白濁人服玄菟丹不效服附子八味丸即愈者不可不知沈堯封曰此即坎中陽微下焦失納之意屢用有效王孟英按陰虛而兼濕火者宜六味丸甚者加黃柏尤妙附玄菟丹局方菟絲子十兩五味子七兩茯苓蓮肉各三兩山藥六兩松硫丸此是方外之方治赤白濁赤白帶日久不愈無熱證者其效如神松香硫黃二味鐵銚內溶化將醋頻頻灑上俟藥如飴移銚置冷處用冷水濡手丸如豆大必須人衆方可否則凝硬難丸每服一錢王孟英按此方究宜慎用固精丸選注云陽虛則無氣以制其精故寐則陽陷而精道不禁隨觸隨泄不必夢而遺也必須提陽固氣乃克有濟鹿茸一具鹿角霜分兩同茸韭子淡干蓯蓉各一兩五味子茯苓熟附子巴戟肉龍骨赤石脂各五錢酒糊丸溫柔澀法葉氏治白淫白龍骨桑螵蛸湖蓮芡實茯苓茯神金櫻子覆盆子遠志肉蜜丸赤水玄珠端本丸治脈大體肥大便晨泄不爽濕熱遺精極驗葉天士云濕熱之病面色赤亮可證苦參川柏各二兩牡蠣蛤粉葛根青蒿白螺螄殼煅各一兩神麯和丸本事方清心丸戴元禮曰有經絡熱而滑者此方最妙大智禪師云腰脊熱而遺者皆熱遺也黃柏冰片鹽湯為丸徐藹輝曰亦有陰虧之極致腿足腰脊肝腎部位作熱而遺者又宜填陰固澀以斂虛陽非可妄投清火宜詳辨脈證導赤散李瀕湖曰一壯年男子夢遺白濁少腹有氣上衝每日腰熱卯作酉涼腰熱則手足冷前陰無氣腰熱退則前陰氣動手足溫又旦多下氣暮多噫氣時振逾旬必遺脈弦滑而大偶投澀藥則一夜二遺遂用此方大劑煎服遺濁皆止生地木通甘草梢王孟英按任脈虛而帶下不攝者往往滋補雖投而不能愈余以海螵蛸一味為粉廣魚鰾煮爛杵丸緑豆大淡菜湯下久服無不收效真妙法也第十節求子素問云女子二七而天癸至任脈通太衝脈盛月事以時下故有子七七而任脈虛太衝脈衰少天癸竭地道不通故形壞而無子沈堯封曰求子全賴氣血充足虛衰即無子故薛立齋曰至要處在審男女尺脈若右尺脈細或虛大無力用八味丸左尺洪大按之無力用六味丸兩尺俱微細或浮大用十補丸此遵內經而察脈用方可謂善矣然此特言其本體虛而不受胎者也若本體不虛而不受胎者必有他病繆仲淳主風冷乘襲子宮朱丹溪主衝任伏熱張子和主胞中實痰丹溪於肥盛婦人主脂膜塞胞陳良甫謂二三十年全不産育者胞中必有積血主以蕩胞湯諸賢所論不同要皆理之所有宜察脈辨證施治蕩胞湯在千金為婦人求子第一方孫真人鄭重之蕩胞湯朴硝丹皮當歸大黃桃仁生用各三銖厚朴桔梗人參赤芍茯苓桂心甘草牛膝橘皮各二銖附子六銖虻蟲水蛭各十枚上十七味㕮咀以清酒五升水五升合煮取三升分四服日三夜一每服相去三時更服如前覆被取微汗天寒汗不出著火籠之必下膿血務須斟酌下盡二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡不盡忍之尤妙王孟英按子不可以強求也求子之心愈切而得之愈難天地無心而成化乃不期然而然之事非可以智力為者惟有病而礙於孕育之人始可用藥以治病凡無病之人切勿妄藥以求子弄巧反拙豈徒無益而已耶縱使有效而藥性皆偏其子稟之非夭札即頑悖余歷驗不爽王孟英按蕩胞湯雖有深意其藥太峻未可輕用惟保胎神佑丸善舒氣鬱緩消積血不但為保胎之良藥亦是調經易孕之仙丹每日七丸頻服甚效余歷用有驗最為穩妙方見下卷王孟英又按世有愚夫愚婦一無所知而敏於生育者此方靈皋所謂此事但宜有人欲而不可有天理也觀於此則一切求子之法皆不足憑況體氣不齊豈容概論有終身不受孕者有畢世僅一産者有一産之後逾十餘年而再妊者有按年而妊者有娩甫彌月而即妊者有每妊必駢胎者且有一産三胎或四胎者駢胎之胞有合有分其産也有接踵而下者有逾日而下者甚有逾一旬半月而下者諺云十個孩兒十樣生是以古人有寧醫十男子莫醫一婦人之説因婦人有胎産之千態萬狀不可以常理測也世之習婦科者不可不究心焉王孟英又按古人五種不男曰螺紋鼓角脈而人多誤解余謂螺乃騾字之訛騾形之人交骨如環不能開坼如受孕必以産厄亡紋則陰竅屈曲如紋之盤旋礙於交合俗謂之實女是也後人不知騾形之異而改為螺遂以紋之似螺者又混於鼓鼓者陰戶有皮鞔如鼓僅有小竅通溺而已設幼時以鉛作鋌逐日紝之久則自開尚可以人力為也角則陰中有物興至亦有能舉者名曰二陰人俗云雌雄人是也脈則終身不行經者理難孕育然暗經亦可受胎錢國賓云蘭溪篾匠之妻自來無經而生四子一女故五種之中惟三者非人力所能治而紋角二種並不可交也特考定之以正相傳之訛又騾形之女初生時穩婆技精者捫之即知其可男可女之身名人痾者亦角類也第十一節受胎總論李東璧曰易云男女構精萬物化生乾道成男坤道成女褚澄言血先至裹精則生男精先至裹血則生女陰陽均至非男非女之身精血散分駢胎品胎之兆道藏言月水無後一三五日成男二四六日成女東垣言血海始淨一二日成男三四日成女聖濟言因氣而左動陽資之則成男因氣而右動陰資之則成女丹溪乃非褚氏而是東垣主聖濟左右之説立論歸於子宮左右之系可謂悉矣竊謂褚氏未可非東垣亦未盡是也蓋褚氏以氣血之先後言道藏以日數之奇偶言東垣以女血之盈虧言聖濟丹溪以子宮之左右言各執一見會而通之理自得矣蓋獨男獨女可以日數論駢胎品胎亦可以日數論乎史載一産三子四子有半男半女或男多女少或男少女多則一三五日為男二四六日為女之説豈其然哉褚氏聖濟丹溪主精血子宮左右之論為有見而道藏東垣日數之論為可疑矣王叔和脈經以脈之左右浮沉辨所生之男女高陽生脈訣以脈之縱橫逆順別駢品之胎形恐臆度之見非確論也王孟英按閲微草堂筆記云夫胎者兩精相搏翕合而成者也媾合之際其情既洽其精乃至陽精至而陰精不至陰精至而陽精不至皆不能成皆至矣時有先後則先至者氣散不攝亦不能成不先不後兩精並至陽先沖而陰包之則陽居中為主而成男陰先沖而陽包之則陰居中為主而成女此生化自然之妙非人力所能為故有一合即成者有千百合而終不成者愚夫婦所知能聖人有所不知能此之謂矣端恪後人沈君辛甫云胎脈辨別處誠醫者所當知若受妊之始曷以得男何緣得女生化之際初無一定諸家議論雖奇無關損益置之可也第十二節辨胎素問云婦人足少陰脈動甚者妊子也沈堯封曰足少陰腎脈也動者如豆厥厥動搖也王太僕作手少陰手少陰脈應在掌後鋭骨之端陷者中直對小指非太淵脈也必有所據全元起作足少陰候在尺中經云尺裡以候腹中胎在腹中當應在尺此為近理素問云陰搏陽別謂之有子沈堯封曰王注陰尺中也搏謂觸於手也尺脈搏擊與寸迥別則有孕之兆也素問云何以知懷子之且生也曰身有病而無邪脈也難經曰女子以腎系胞三部脈浮沉正等按之不絶者有妊也沈堯封曰叔和云婦人三部脈浮沉正等以手按之不絶者孕子也妊脈初時寸微呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也此即陰搏陽別之義言尺脈滑數寸脈微小尺與寸脈別者孕子也王叔和曰妊脈四月其脈左疾為男右疾為女俱疾為生二子又曰左尺偏大為男右尺偏大為女左右俱大産二子大者如實狀即陰搏之意尺脈實大與寸迥別但分男左女右也又曰左脈沉實為男右脈浮大為女樓全善曰按丹溪云男受胎在左子官女受胎在右子宮推之於脈其義亦然如胎在左則氣血護胎必盛於左故脈左疾為男左大為男也胎在右則氣血護胎必盛於右故脈右疾為女右大為女也亦猶經文陰搏陽別謂之有子言胎必在身半之下氣血護胎必盛於下故陰尺鼓搏與陽寸迥別也千金云令妊婦面南行從背後呼之左回首者是男右回首者是女又女腹如箕以女胎背母足膝抵腹下大上小故如箕男腹如釜以男胎向母背脊抵腹其形正圓故如釜也沈堯封曰內經妊娠數條惟陰搏陽別尤為妙諦素問診法上以候上下以候下氣血聚於上則寸脈盛氣血聚於下則尺脈盛其勢然也試之瘡瘍無不驗者況胎在腹中氣血大聚豈反無徵驗之理胎繫於腎在身半以下故見於尺部但人脈體不同有本大者有本小者即懷妊時有見動脈者有不見動脈者然尺中或疾或數總與寸脈迥然有別細審自得即左右男女亦然受胎時偏左成男氣血聚於左則左重故呼之則左顧便脈必形於左尺受胎時偏右成女氣血聚於右則右重呼之則右顧便脈必形於右尺此一定之理也至若丹溪男受胎於左子宮女受胎於右子宮此是語病猶言偏於子宮之左偏於子宮之右耳原非有二子宮也王孟英按諸家之論皆有至理而皆有驗有不驗余自髫年即專究於此三十年來見聞多矣有甫受孕而脈即顯呈於指下者有半月一月後而見於脈者有二三月而見於脈者有始見孕脈而五六月之後反不見孕脈者有始終不見於脈者有受孕後反見弦澀細數之象者甚有兩脈反沉伏難尋者古人所論原是各抒心得奈死法不可以限生人紙上談兵未嘗閲歷者何足以語此惟今春與楊素園大令談之極蒙折服殆深嘗此中甘苦也憶辛丑秋診周光遠令正之脈右寸關忽見弦大滑疾上溢魚際之象平昔之脈未嘗見此頗為駭然及詢起居諸無所苦惟汛愆半月耳余曰妊也並可必其為男繼而其父孫際初聞之診乃女脈曰妊則或然恐為女孕余曰肺象乎天今右寸脈最弦滑且見上溢之象豈非本乎天者親上耶孫曰此雖君子創解然極有理究不知瓜紅何似耳逮壬寅夏果舉一男聊附一端以為鑿鑿談脈者鑑第十三節妊婦似風孟英按即子癇證沈堯封曰妊婦病源有三大綱一曰陰虧人身精血有限聚以養胎陰分必虧二曰氣滯腹中增一障礙則升降之氣必滯三曰痰飲人身臟腑接壤腹中遽增一物臟腑之機栝為之不靈津液聚為痰飲知此三者庶不為邪説所惑妊婦卒倒不語或口眼歪斜或手足瘛瘲皆名中風或腰背反張時昏時醒名為痙又名子癇古來皆作風治不知卒倒不語病名為厥陰虛失納孤陽逆上之謂口眼歪斜手足瘛瘲或因痰滯經絡或因陰虧不吸肝陽內風暴動至若腰背反張一證臨危必見戴眼其故何歟蓋足太陽膀胱之經脈起於目內眥上額交巔循肩膊內夾脊抵腰中足太陽主津液虛則經脈時縮脈縮故腰背反張經云瞳子高者太陽不足謂太陽之津液不足也脈縮急則瞳子高甚則戴眼治此當用地黃麥冬等藥滋養津液為主胎前病陽虛者絶少慎勿用小續命湯王孟英按陰虛氣滯二者昔人曾已言之痰飲一端則發前人之未發因而悟及産後譫妄等證誠沈氏獨得之祕反復申明有裨後學不亦多乎沈堯封曰錢鵠云正室飲食起居無恙一夜連厥數十次發則目上竄形如尸次日又厥數十次至晚一厥不醒以火炭投醋中近鼻熏之不覺切其脈三部俱應不數不遲並無怪象診畢伊父倪福增曰可治否余曰可用青鉛一斤化煬傾盆內撈起再煬再傾三次取水煎生地一兩天冬二錢細石斛三錢甘草一錢石菖蒲一錢服倪留余就寢書室晨起見倪復治藥云昨夜服藥後至今止厥六次厥亦甚輕故照前方再煎與服服後厥遂不發後生一子計其時乃受胎初月也移治中年非受胎者亦屢效吳門葉氏治一反張發時如跳蟲離席數寸發過即如平人用白芍甘草紫石英炒小麥南棗煎服而愈捷徑方載一毒藥攻胎藥毒衝上外證牙關緊急口不能言兩手強直握拳自汗身有微熱與中風相似但脈浮而軟十死一生醫多不識若作中風治必死用白扁豆二兩生去皮為末新汲水調下即效沈堯封曰痰滯經絡宜二陳加膽星竹瀝薑汁第十四節初娠似勞沈堯封曰錢彬安室人內熱咳嗆涎痰夜不能臥脈細且數呼吸七至邀余診視問及經事答言向來不準今過期不至余因鄰近素知伊稟怯弱不敢用藥就診吳門葉氏云此百日勞不治延本邑浦書亭治療投逍遙散不應更蔞蕤湯亦不應曰病本無藥可治但不藥必駭病者可與六味湯聊復爾爾因取六味丸料二十分之一煎服一劑咳減二劑熱退四劑霍然惟腹中覺有塊日大一日彌月生一女母女俱安越十餘年女嫁母故後以此法治懷妊咳嗆涎疾或內熱或不內熱或脈數或脈不數五月以內者俱效五月以外者有效有不效王孟英按亦有勞損似娠者蓋凡事皆有兩面也第十五節喘丹溪曰因火動胎逆上作喘急者用條芩香附為末水調服呂滄洲曰有婦胎死腹中病喘不得臥醫以風藥治肺診其脈氣口盛人迎一倍左關弦徑而疾兩尺俱短而離經因曰病蓋得之毒藥動血以致胎死不下奔迫而上衝非外感也大劑芎歸湯加催生藥服之下死胎其夫曰病妾有娠室人見嫉故藥去之衆所不知也沈堯封曰外感作喘仍照男子治故不録他病仿此王海藏醫壘元戌曰胎前病唯當順氣若外感四氣內傷七情以成他病治法與男子同當於各證類中求之惟動胎之藥切不可犯第十六節惡阻金匱曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之沈堯封曰樓全善云惡阻謂嘔吐噁心頭眩惡食擇食是也絶之者謂絶止醫藥候其自安也余嘗治一二妊婦嘔吐愈治愈逆因思絶之之旨停藥月餘自安朱丹溪曰有妊二月嘔吐眩暈脈之左弦而弱此惡阻因怒氣所激肝氣既傷又挾胎氣上逆以茯苓半夏湯下抑青丸千金半夏茯苓湯治妊娠阻病心中憒悶空煩吐逆惡聞食氣頭眩體重四肢百節疼煩沉重多臥少起惡寒汗出疲極黃瘦半夏生薑各三十銖乾地黃茯苓各十八銖橘皮旋覆花細辛人參芍藥芎藭桔梗甘草各十二銖上十二味㕮咀以水一斗煮取三升分三服若病阻積月日不得治及服藥冷熱失候病變客熱煩渴口生瘡者去橘皮細辛加前胡知母各十二銖若變冷下利者去幹地黃入桂心十二銖若食少胃中虛生熱大便閉塞小便亦少者宜加大黃十八銖去地黃加黃芩六銖余依方服一劑得下後消息看氣力冷熱增損更服一劑湯便急使茯苓丸令能食便強健也忌生冷醋滑油膩千金茯苓丸服前湯兩劑後服此即效茯苓人參桂心熬乾薑半夏橘皮各一兩白朮葛根甘草枳實各二兩上十味蜜丸梧子大飲服二十丸漸加至三十丸日三次徐藹輝曰肘後不用幹薑半夏橘皮白朮葛根只用五物妊娠忌桂故熬王孟英按胎前産後非確有虛寒脈證者皆勿妄投熱劑暑月尤宜慎之又治妊娠惡阻嘔吐不下食方青竹茹橘皮各十八銖茯苓生薑各一兩半夏三十銖上五味水六升煮取二升半分三服千金橘皮湯治妊娠嘔吐不下食橘皮竹茹人參白朮各十八銖生薑一兩厚朴十二銖上六味水七升煮取二升半分三服沈堯封曰費姓婦懷妊三月嘔吐飲食服橘皮竹茹黃芩等藥不效松郡車渭津用二陳湯加旋覆花薑皮水煎沖生地汁一杯一劑吐止四劑全愈一醫笑曰古方生地半夏同用甚少不知此方即千金半夏茯苓湯除去細辛桔梗芎藭白芍四味堯封又曰嘔吐不外肝胃兩經病人身臟腑本是接壤懷妊則腹中增了一物臟腑機栝為之不靈水穀之精微不能上蒸為氣血凝聚而為痰飲窒塞胃口所以食入作嘔此是胃病又婦人既娠則精血養胎無以攝納肝陽而肝陽易升肝之經脈夾胃肝陽過升則飲食自不能下胃此自肝病千金半夏茯苓湯中用二陳化痰以通胃也用旋覆高者抑之也用地黃補陰吸陽也用人參生津養胃也其法可謂詳且盡矣至若細辛亦能散痰桔梗亦能理上焦之氣芎藭亦能宣血中之滯未免升提白芍雖能平肝斂陰仲景法胸滿者去之故車氏皆不用斟酌盡善四劑獲安有以也王孟英按發明盡致精義入神沈堯封曰蔡姓婦惡阻水藥俱吐松郡醫用抑青丸立效黃連一味為末粥糊丸麻子大每服二三十丸堯封又曰肝陽上升補陰吸陽原屬治本正理至肝陽亢甚滴水吐出即有滋陰湯藥亦無所用不得不用黃連之苦寒先折其太甚得水飲通然後以滋陰藥調之以收全效王孟英按左金丸亦妙沈堯封曰沈姓婦惡阻水漿下咽即吐醫藥雜投不應身體骨立精神困倦自料必死醫亦束手一老婦云急停藥八十日當愈後果如其言停藥者即金匱絶之之義也至八十日當愈一語豈金匱六十日當有此證之誤耶不然何此言之驗也堯封又曰朱宗承正室甲戌秋體倦吐食診之略見動脈詢得停經兩月惡阻證也述前治法有效有不效如或不效即當停藥録半夏茯苓湯方與之不效連更數醫越二旬復邀余診前之動脈不見但覺細軟嘔惡日夜不止且吐蛔兩條余曰惡阻無礙吐蛔是重候姑安其蛔以觀動靜用烏梅丸早晚各二十丸四日蛔止嘔亦不作此治惡阻之變局也故志之第十七節子煩妊婦煩名子煩丹溪曰因胎元壅鬱熱氣所致沈堯封曰子煩病因曰痰曰火曰陰虧因痰者胸中必滿仲景云心中滿而煩宜瓜蒂散此是吐痰法妊婦禁吐宜二陳湯加黃芩竹茹旋覆花陰虧火甚者仲景黃連阿膠湯最妙汪訒庵醫方集解有竹葉湯一方治妊娠心驚膽怯終日煩悶名子煩因受胎四五月相火用事或盛夏君火大行俱能乘肺以致煩悶胎動不安亦有停痰積飲滯於胸膈以致煩悶者麥冬錢半茯苓黃芩一錢人參五分淡竹葉十片竹葉清煩黃芩消熱麥冬涼肺心火乘肺故煩出於肺茯苓安心人參補虛妊娠心煩固多虛也如相火盛者單知母丸君火盛者單黃連丸心神不安者硃砂安神丸切不可作虛煩用梔豉等藥治之一方茯苓為君無人參有防風知母有痰者加竹瀝第十八節子懸嚴氏紫蘇散許叔微曰治懷胎近上脹滿痰痛謂之子懸陳良甫曰妊至四五月君相二火養胎熱氣逆上胎湊心胸腹滿痞悶名曰子懸用此加黃芩山梔之類一方無川芎名七寶散許叔微云六七月子懸者用之數數有驗不十服胎便近下紫蘇一錢腹皮人參川芎橘皮白芍當歸各三分甘草一分銼分三服水一盞生薑四片蔥白煎去渣服徐藹輝曰去川芎因避升提之故汪訒庵曰治胎氣不和湊上胸腹腹滿頭疼心腹腰脅皆痛名子懸因下焦氣實相火旺盛舉胎而上上逼心胸也每服止用蘇葉一錢當歸七分腹皮以下皆五分甘草二分無蔥白心腹痛者加木香延胡陳來章曰芎歸芍藥以和其血蘇橘大腹以順其氣氣順血和則胎安矣既利其氣復以人參甘草養其氣者順則順其邪逆之氣養則養其沖和之氣也徐藹輝曰延胡動血恐未可用趙養葵有命門虛寒胎上湊心就暖一説沈堯封曰此是百中僅一非實是虛寒脈證熱藥不可嘗試沈堯封曰郁姓婦懷妊九月偶因勞動遂覺腹痛胎漸升至胸中氣塞不通忽然狂叫咬人數人扶持不住病名子上撞心即子懸之最重者用旋覆代赭湯去參棗連灌兩劑胎墮得生又一婦證亦如之服前藥胎墮而死堯封又曰陸檢修正室子上撞心江穩婆教磨代赭汁服遂産兩子一子在上橫於心下一子撞著上子故經一晝夜不至撞心得不死産下遂安蔥白湯治胎上逼心煩悶又治胎動困篤本草云蔥白通陽安胎樓全善曰此方神效脈浮滑者宜之蔥白二七莖濃煮汁飲之胎未死即安已死即出未效再服陳良甫曰一婦孕七個月遠歸忽然胎上衝作痛坐臥不安兩醫治之無效遂云胎已死用萆麻子研爛和麝香貼臍中以下之命在呼吸余診視兩尺脈絶他脈和平余問二醫作何證治之答云死胎問何以知之曰兩尺沉絶以此知之余曰此説出何書二醫無答余曰此子懸也若是死胎卻有辨處面赤舌青子死母活面青舌赤吐沫母死子活唇舌俱青子母俱死今面不赤舌不青其子未死是胎上逼心宜以紫蘇飲連進至十服而胎近下矣李氏曰子懸證火盛極一時心氣悶絶而死紫蘇飲連進可救若兩尺脈絶者有誤服動胎藥子死腹中則憎寒手指唇爪俱青全以舌為證驗芎歸湯救之王孟英按戊申秋荊人妊八月而患咳嗽礙眠鼻衄如射面浮肢腫諸藥不應諦思其故素屬陰虛內火自盛胎因火動上湊心胸肺受其沖咳逆乃作是不必治嗽仍當以子懸治之因以七寶散去參芍生薑為其胸滿而內熱也加生石膏以清陽明之火熟地黃以攝根蒂之陰投匕即安今年冬仲亦以八月之娠而悲哀勞瘁之餘胎氣衝逆眩暈嗽痰脘脹便溏苔黃口渴豫蠲飲六神湯去膽星茯苓加枳實蘇葉大腹皮以理氣開鬱黃芩梔子竹茹以清熱安胎一劑知二劑已凡子懸因於痰滯者余每用此法無不應如桴鼓第十九節妊娠腫脹沈堯封曰妊婦腹過脹滿或一身及手足面目俱浮病名子滿或名子腫或名子氣或名胎水或名琉璃胎但兩腳腫者或名皺腳或名脆腳名色雖多不外有形之水病與無形之氣病而已何則胎礙臟腑機栝不靈腎者胃之關也或關門不利因而聚水或脾不能散精行肺或肺不能水精四布此有形之水病也又腹中增一物則大氣升降之道窒塞此無形之氣病也病在有形之水其證必皮薄色白而亮病在無形之氣其證必皮厚色不變説見內經脹論細玩自明更有痰滯一證痰雖水類然凝聚質厚不能遍及皮膚惟壅滯氣道使氣不宣通亦能作腫其皮色不變故用理氣藥不應加化痰之品自然獲效徐藹輝曰靈樞水脹論曰水始起目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也愚按於膚脹言皮厚色不變則水脹之皮薄色變可知矣存參千金鯉魚湯治妊娠腹脹滿或渾身浮腫小便赤澀沈堯封曰此治有形之水也以腹脹滿為主身腫溺澀上加一或字乃或有或無之詞不必悉具陳良甫曰胎孕至五六個月腹大異常此由胞中蓄水名曰胎水不早治恐胎死或生子手足軟短宜千金鯉魚湯蓋鯉魚歸腎又是活動之物臣以苓朮薑橘直達胞中去水又恐水去胎虛佐以歸芍使胎得養真神方也當歸白芍各一錢茯苓一錢五分白朮二錢橘皮紅五分鯉魚一尾去鱗腸作一服白水煮熟去魚用汁一盞半入生薑三片煎一盞空心服胎水即下如腹悶未盡除再合一服金匱葵子茯苓湯治妊娠有水氣身重小便不利灑淅惡寒起即頭眩沈堯封曰此滑利之劑亦治有形之水葵子一斤茯苓三錢為散飲服方寸匕日三服小便利則愈天仙藤散治妊娠三月成胎之後兩足自腳面漸腫至腿膝行步艱難喘悶妨食狀似水氣甚至足指間出黃水者謂之子氣此元豐中淮南名醫陳景初制本名香附散李伯時更名天仙芚散沈堯封曰此理氣方也腳面漸腫至腿膝並足指間黃水出是水與氣同有之證不得即謂之氣病必皮厚色不變方是氣病用此方為對證天仙藤即青木香芚洗略焙香附炒陳皮甘草烏藥木香等分銼末每服五錢加生薑三片紫蘇五葉水煎日三服腫消止藥齊仲甫曰妊娠八九月見腳腫不必治當易産因胎中水必多不致燥胎故也若初妊即腫者是水氣過多兒未成體恐胎傷壞腳腫主男胎宋少主微行徐文伯從見一妊婦不能行少主脈之曰此女形也文伯診之曰此男胎也在左則胎色黑少主怒欲破之文伯惻然曰臣請針之補合谷瀉三陰交應手而下男形而色黑薛立齋案云一妊婦腹脹小便不利吐逆諸醫雜進溫胃寬氣等藥服之反吐轉加脹滿湊心驗之胎死已久服下死胎藥不能通因得鯉魚湯其論曰妊婦通身腫滿或心胸急脹名曰胎水遂看妊婦胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎此證蓋因懷妊腹大不以為怪競至傷胎可不慎哉第二十節妊娠經來王叔和曰婦人月經下但少師脈之反言有娠其後審然其脈何類曰寸口脈陰陽俱平營衛調和沈注寸口脈陰陽俱平自然營衛調和也按之則滑浮之則輕沈注重按之以候陰分則滑是有餘之象浮取之以候陽分則輕是不足之象竊謂此即陰搏陽別之義陽明少陰各如經法沈注沖隸陽明主血任隸少陰主精各如經法精血無損是有妊而不墮之象身反灑淅不欲食頭痛心亂嘔吐沈注諸證經所謂身有病而無邪脈妊子也呼之則微吸之不驚陽多氣溢陰滑氣盛滑則多實六經養成所以月見沈注呼出之氣微數吸入之氣舒徐不驚是陽氣多溢於外令陽氣不足於內陰脈滑則陰血內盛所以月見經來六經養成句無解尚須查詳陰見陽精汁凝胞散散者損胎沈注若陰分虛而陽精乘之胞中必散方是胎墮然胞中若散脈必散而不滑今脈滑無虞也設復陽盛雙妊二胎今陽不足是故令激經也沈注設陰陽俱盛必雙胎今氣不足而血有餘非雙胎乃激經也考異月經下周本作經月下但少周本作但為微少娠作嘔何類周本下有何以別之四字按之則滑周無則字不欲食周本下有飲字嘔吐周本作嘔噦欲吐呼之則微周作呼則微數吸之不驚周作吸則不驚散者損胎周作散者損墮産乳集曰妊婦月信不絶而胎不損問産科熊宗古答云此婦血盛氣衰其人必肥既妊後月信常來而胎不動若便以漏胎治之則胎必墮若不作漏胎治則胎未必墮宗古之言誠為有見然亦有未必因血盛者榮經有風則經血喜動以風勝故也則所下者非養胎之血若作漏胎治投以滋補是實實也胎豈有不墮若知是風專以一味風藥投之經信可止即不服藥胎亦無恙亦有胎本不固因房室不節先漏而後墮胎者須作漏胎治又不可不審沈堯封曰妊娠經來與漏胎不同經來是按期而至來亦必少其人血盛氣衰體必肥壯漏胎或因邪風所迫或因房室不節血來未必按期體亦不必肥壯且漏胎之因不盡風邪房室更有血熱肝火諸證不可不察脈辨證風入脈中其脈乍大乍小有時隆起所云一味治風藥是舉卿古拜散沈注即華他愈風散荊芥略炒為末每服三錢黑豆淬酒調服血熱證必五心煩熱治以黃芩阿膠涼血之藥肝火內動脈必弦數並見氣脹腹痛治以加味逍遙散房勞證脈必虛宜人參或虛而帶數宜六味湯虞天民曰或問妊婦有按月行經而胎自長者有三五個月其血大下而胎不墮者或及期而娩或逾月而生其理何歟曰按月行經而胎自長者名曰盛胎其婦氣血充盛養胎之外其血有餘故也有數月之胎而血大下謂之漏胎因事觸胎動其衝脈故血下而不傷子宮也然孕中失血胎雖不墮氣血亦虧多致逾月不産曾見有十二三月十七八月或二十四五個月生者往往有之俱是氣血不足胚胎難長故耳凡十月之後未産者當大補氣血以培養之庶無分娩之患李氏曰胎漏自人門下血尿血自尿門下血蕭賡六云胎漏下血頻出無時尿血溺時方下不溺則不下沈堯封曰尿血小薊飲子妙王孟英按懷孕屢漏之後氣血耗傷有遲至三四十月而生者或謂妊娠帶下多主生女亦大不然也吳醞香大令五令媳素患帶婚後帶益盛繼漸汛愆醫皆以為帶所致久投溫澀無效余診之脈甚滑數以懷麟斷清其胎火而愈及期果誕一子第二十一節子淋轉胞徐藹輝曰此淋字與俗所云赤淋淋字不同彼指赤帶言系女精此係指小水言也妊婦淋曰子淋小便不出曰轉胞子淋小便頻數點滴而痛轉胞頻數而溲少不痛淋屬肝經陰虧火熾轉胞因膀胱被胎壓住膀胱止有一口未溺時其口向上口端橫一管上半管即名下焦下半管即是溺孔未溺時膀胱之底下垂如瓶狀其口在上與下焦直對溺從下焦滲入故曰下焦者別回腸而滲入膀胱焉欲溺時大氣舉膀胱之底如傾瓶狀其口向下從溺孔注出故曰氣化則能出矣轉胞一證因胎大壓住膀胱或因氣虛不能舉膀胱之底氣虛者補氣胎壓者托胎若浪投通利無益於病反傷正氣徐藹輝曰汪訒庵又謂胞系轉戾臍下急痛為轉胞溲或數或閉二説小異子淋方生地阿膠黃芩黑山梔木通甘草水煎服丹溪治一妊婦小便不通令一婦用香油塗手自産門入托起其胎溺出如注即用人參黃耆升麻大劑煎服又治一婦轉胞用參歸煎服探吐得愈沈堯封曰訒庵載其方名參朮飲用當歸熟地黃芎藭芍藥人參白朮留白陳皮半夏炙甘草加薑煎空心服丹溪論曰窘胞之病婦之稟受弱者憂悶多者性躁急者食味厚者多有之古方用滑藥鮮效因思胞不自轉為胎被壓若舉起胎胞必自疏水道自通矣近吳宅寵人患此脈似澀重則弦豫曰此得之憂患澀為血少氣多弦為有飲血少則胎弱不能舉氣多有飲中焦不清而溢則胎避而就下乃以上藥與飲隨以指探喉中吐出藥汁候氣定又與之而安此恐偶中後治數人皆效仲景云婦人本肥盛今反羸瘦胞系了戾但利小便則愈宜服腎氣丸以中有茯苓故也地黃為君功在補胞又法將孕婦倒豎胞轉而小便自通矣沈堯封曰汪昂採本事安榮散治子淋心煩悶亂雲子淋膀胱小腸虛熱也虛則不能制水熱則不能通利故淋心與小腸相表裡故煩悶方用人參甘草之甘以補虛木通燈草之滲滑石之滑以通淋閟肺燥則天氣不降而麥冬能清之腎燥則地氣不升而細辛能潤之血燥則溝瀆不濡而當歸能滋之也亦有因房勞內傷胞門衝任虛者宜八珍湯或腎氣丸第二十二節妊娠滯下及下利本草綱目妊娠下利用雞卵一個烏骨者尤妙開孔去白留黃入漂鉛丹五錢攪勻泥裹煨透研末每服二錢米飲下一服效是男兩服效是女沈堯封曰曾試過有效有不效然利即不止而腹痛必緩薛立齋云一妊婦久利用消導理氣之劑腹內重墜胎氣不安又用阿膠艾葉之類不應用補中益氣湯而安繼用六君子全愈又云妊身利下黃水是脾土虧損其氣下陷也宜補中湯王孟英按此下利乃泄瀉自利之證若滯下赤白之痢證仍當別治第二十三節妊娠腹痛金匱曰婦人懷妊腹中㽱痛者當歸芍藥散主之當歸三兩芍藥一斤茯苓四兩白朮四兩澤瀉半斤芎藭三兩上六味為散取方寸匕酒和日三服金匱曰妊娠腹中痛為胞阻膠艾湯主之芎藭阿膠甘草各二兩艾葉當歸各三兩芍藥四兩乾地黃六兩上七味水五升清酒三升合煮取三升去渣內膠令消盡溫服一升日三次徐藹輝曰嚴氏用治胎動胎漏經漏腰痛腹滿搶心短氣加黃耆訒庵亦謂妊娠下血腹痛為胞阻主此湯又曰又方阿膠一斤蛤粉炒艾葉數莖亦名膠艾湯治胎動不安腰腹疼痛或胎上搶心去血腹痛金匱曰懷妊六七月脈弦發熱其胎愈脹腹痛惡寒者小腹如扇所以然者子臟開故也當以附子湯溫其臟附子二枚破八片去皮人參二兩白朮四兩芍藥三兩茯苓三兩大全云妊娠四五月後每當胸腹間氣刺滿痛或腸鳴以致嘔逆減食此由忿怒憂思過度飲食失節所致蔡元度寵人有子夫人怒欲逐之遂成此病醫官王師復處以木香散莪朮木香甘草丁香鹽湯下三服而愈沈堯封曰夏墓蕩一婦豐前橋章氏女也己卯夏章氏來請云懷孕七個月患三瘧痢疾及診病者止云小便不通腹痛欲死小腹時有物壟起至若痢疾日夜數十起所下無多仍是糞水瘧亦寒熱甚微豫思俱是肝病蓋肝脈環陰器抵少腹肝氣作脹故小腹痛溺不利脹甚則數欲大便肝病似瘧故寒熱豫議泄肝法許其先止腹痛後利小便彼云但得如此即活不必顧胎豫用川楝子橘核白通草白芍茯苓甘草煎服一劑腹痛止小便利四劑瘧利盡除胎亦不墮以後竟不服藥彌月而産王孟英按徐悔堂云秣陵馮學園之內久患痞痛每發自臍間策策動未幾遍行腹中疼不可忍頻年醫治不一其人而持論各異外貼膏藥內服湯丸攻補溫涼備嘗不效病已瀕危謝絶醫藥逮半月後病勢稍減兩月後飲食如常而向之策策動者日覺其長馴至滿腹又疑其鼓也復為醫治亦不能愈如是者又三年忽一日腹痛幾死旋産一男母子無恙而腹痞消計自初病至産蓋已九年餘矣此等奇證雖不恆見然為醫者不可不知也第二十四節妊娠腰痛大全云婦人腎以系胞腰痛甚則胎墮故最為緊要若閃挫氣不行者通氣散腎虛者青娥不老丸總以固胎為主通氣散方良方破故紙瓦上炒香為末先嚼胡桃一個爛後以溫酒調服故紙末三錢空心服治妊婦腰痛不可忍此藥最神王孟英按故紙性熱妨胎惟閃挫可以暫用或但服胡桃較妥薛立齋云腰痛因肝火動者小柴胡湯加白朮枳殼山梔沈堯封曰腰之近脊處屬腎兩旁近季脅者屬肝第二十五節妊娠腹內鐘鳴大全用鼠窟前後土為細末研麝香酒調下立愈第二十六節腹內兒哭産寶云腹中臍帶上疙瘩兒含口中因妊婦登高舉臂脫出兒口以此作聲令妊婦曲腰就地如拾物狀仍入兒口即止又云用空房中鼠穴土同川黃連煎汁飲亦效沈堯封曰相傳腹內鐘鳴即是兒哭今人治此撒豆一把在地令妊婦細細拾完即愈此是妙法王孟英按此讆言也王清任曰初結胎無口時又以何物吮血養生既不明白何不歸而謀諸婦訪問的確再下筆庶不貽笑後人此説甚精余嘗謂身中之事而身外揣測雖聖人亦不免有未必盡然之處故拙案論證但以氣血寒熱言之固屬弇陋實不敢以己所未信者欺人也今春與楊素園大令言及從來臟腑之論殊多可疑楊侯嘆曰君可謂讀書得間不受古人之欺者矣因出玉田王清任醫林改錯見贈披閲之下竟將軒岐以來四千餘年之案一日全反毋乃駭聞然此公徵諸目擊非托空言且楊侯遍驗諸獸無不吻合然則昔之鑿鑿言臟腑之形者豈不皆成笑柄哉然泰西人身䓪説一書流入中國已二百餘年所載臟腑與王説略同而俞理初未見改錯過信古書於癸巳類稿內沿襲舊偽謂中外臟腑迥殊且云外洋人睪丸有四枚尤屬杜撰欺人第二十七節養胎徐藹輝曰金匱云懷身七月太陰當養以此見十月養胎之説其來久矣徐之才曰妊娠一月名胎胚足厥陰肝脈養之二月名始膏足少陽膽脈養之三月名始胞手少陰心主胞絡脈養之四月始受水精以成血脈手少陽三焦脈養之五月始受火精以成氣足太陰脾脈養之六月始受金精之氣以成筋足陽明胃脈養之七月始受木精之氣以成骨手太陰肺脈養之八月始受土精之氣以成膚革手陽明大腸脈養之九月始受石精之氣以成毛髮足少陰腎脈養之十月五臟六腑皆具俟時而生徐藹輝曰人鏡經惟手太陽小腸與手少陰心二經不養者以其上為乳汁下主月水也王孟英按此亦道其常耳有每妊不足月而産者有必逾期而産者有先後不等者亦不為病也惟産不足月而形有未備或産雖足月而兒極萎小者皆母氣不足為病再有身時須預為調補自然充備余鄰家畜一母雞連下數卵殼皆軟鄰以為不祥欲殺之余謂此下卵過多母氣虛也令以糯米蛇床子飼之數日後下卵如常推之於人理無二致巢元方曰妊娠受胎七日一變墮胎在三五七月者多在二四六月者少三月屬心五月屬脾七月屬肺皆屬臟臟為陰陰常不足故多墮耳如在三月墮者後孕至三月仍墮以心脈受傷也先須調心五月七月墮者亦然惟一月墮者人不知也一月屬肝怒則多墮洗下體竅開亦墮一次即墮肝脈受傷下次仍墮今之無子者大半是一月墮者非盡不受胎也故凡初交後最宜將息勿復交接以擾子宮勿令勞怒勿舉重勿洗浴又多服養肝平氣藥則胎固矣丹溪曰陽施陰化胎孕以成血氣虛損不足榮養其胎則自墮譬如枝枯則果落藤萎則花墮或勞怒傷情內火便動亦能動胎正如風撼其樹人折其枝也火能消物造化自然病源乃謂風冷傷子臟而墮未得病情者也有孕婦至三四月必墮其脈左手大而無力重取則澀知血少也止補中氣使血自榮以白朮濃煎下黃芩末數十劑而安因思胎墮於內熱而虛者為多曰熱曰虛當分輕重蓋孕至三月上屬相火所以易墮不然黃芩熟艾阿膠何謂安胎妙藥耶方約之曰婦人有娠則礙脾運化遲而生濕濕生熱丹溪用黃芩白朮為安胎聖藥蓋白朮健脾燥濕黃芩清熱故也但妊娠賴血養胎方內四物去川芎佐之為尤備耳張飛疇曰古人用條芩安胎惟形瘦血熱營行過疾胎常上逼者相宜若形盛氣衰胎常下墜者非人參舉之不安形實氣盛胎常不運者非香砂耗之不安血虛火旺腹常急痛者非歸芍養之不安體肥痰盛嘔逆眩暈者非二陳豁之不安此皆治母氣之偏勝也若有外邪仍宜表散伏邪時氣尤宜急下惟忌芒硝切不可犯王孟英按條芩但宜於血熱之體若血虛有火者余以竹茹桑葉絲瓜絡為君隨證輔以他藥極有效蓋三物皆養血清熱而熄內風物之堅莫如竹皮禮云如竹箭之有筠是也皮肉緊貼亦莫如竹故竹雖蓯而皮肉不相離實為諸血證之要藥觀塞舟不漏可知矣桑葉蠶食之以成絲絲瓜絡筋膜聯絡質韌子堅具包羅維繫之形且皆色青入肝肝虛而胎系不牢者勝於四物阿膠多矣惜未有發明之者王海藏曰安胎之法有二如母病以致動胎者但療母則胎自安若胎有觸動以致母病者安胎則母自愈丹溪云有婦經住或成形未具其胎必墮察其性急多怒色黑氣實此相火太盛不能生氣化胎反食氣傷精故也丹溪又曰有婦經住三月後尺脈或澀或微弱其婦卻無病知是子宮真氣不全故陽不施陰不化精血雖凝終不成形或産血塊或産血泡也惟脈洪盛者不墮第二十八節胎動不安血虛火盛其婦必形瘦色黑其胎常上逼者宜條芩阿膠徐藹輝曰前張飛疇説謂形瘦血熱宜條芩血虛火旺宜歸芍此似將上二條併為一治想須在胎上逼與腹急痛上分別未知是否存參氣虛婦體肥白胎常下墜宜人參徐藹輝曰體肥白是氣虛證據宜與張説參看又思體肥白者未必皆氣虛必肥白而胎下墜方是形盛氣衰也須辨存參王孟英按審屬氣虛欲墮者補中益氣法甚妙形氣盛胎常不運者宜香砂痰氣阻滯體肥嘔逆眩暈者宜二陳怒氣傷肝加味逍遙散毒藥動胎白扁豆二兩生去皮末新汲水下沈堯封曰已見厥逆門須合參以辨其證交接動胎其證多嘔産寶百問方飲竹瀝一升有驗人參尤妙築磕著胎惡露已下疼痛不止口噤欲絶用神妙佛手散探之若不損則痛止子母俱安若損胎立便逐下即芎歸湯治傷胎多神效胎動下血不絶欲死本草綱目用蜜蜂蠟如雞子大煎三五沸投美酒半升服立瘥馮云神效蠟淡而性澀入陽明故也王孟英按懷妊臨月並無傷動驟然血下不止腹無痛苦者名海底漏亟投大劑參耆十不能救其一二此由元氣大虛衝脈不攝而營脫於下也王叔和曰胎病不動欲知生死令人摸之如覆盆者則男如肘頸參差起者女也冷者為死溫者為生第二十九節胎死腹中及胞衣不下聖濟總録云胞衣不下急於胎之未生子死腹中危於胎之未下蓋胎兒未下子與母氣通其呼吸若子死腹中胞臟氣寒胎血凝沍氣升不降古方多用行血順氣藥及硝石水銀硇砂之類然胎已死軀形已冷血凝氣聚復以至寒之藥下之不惟無益而害母命也多矣古人用藥深於用意子死之理有二端用藥寒溫各從其宜如娠婦胎漏血儘子死者有墜墮顛撲內傷子死者有久病胎萎子死者以附子湯進三服使胞臟溫暖凝血流動蓋以附子能破寒氣墮胎故也若因傷寒熱證溫瘧之類胎受熱毒而死留於胞中不下者古人慮其胎受熱毒勢必脹大難出故用朴硝水銀硇砂之類不惟使胎不脹且能使胎化爛副以行血順氣之藥使胎即下也熱病胎死腹中新汲水濃煮紅花汁和童便熱飲立效見本章經疏妊病去胎大麥芽一升蜜一升服之即下見千金方齊仲甫曰墮胎後血出不止一則因熱而行一則氣虛不能斂瀉血多者必煩悶而死或因風冷墮胎血結不出搶上攻心煩悶而死當溫經逐寒其血自行若血淋漓不止是衝任氣虛不能約制故也宜膠艾湯加伏龍肝散王孟英按有無故墮胎而惡露全無者此血虛不能榮養如果之未熟而落血既素虧不可拘常例而再妄行其瘀也問何以知胎死曰面赤舌青母活子死面青舌赤子活母死面舌俱青子母俱死死胎墜脹瘀痛亦與常産不同王孟英按吳鞠通云死胎不下不可拘執成方而悉用通法催生亦然當求其不下之故參以臨時所現之脈證若何補偏救弊而胎自下也余謂諸病皆爾不特下死胎也又寓意草有用瀉白散加芩桔以下死胎之案可見人無一定之病病非一法可治藥無一定之用隨機應變貴乎用得其當也王孟英按許裕卿診邵涵貞室娠十七月不産不敢執意憑脈問諸情況果孕非病但云孕五月以後不動心竊訝之為主丹參一味今日服七錢兩旬胎下已死而枯其胎之死料在五月不動時經年在腹不腐而枯如果實在樹敗者必腐但亦有不腐者則枯胎之理可推也余謂此由結胎之後生氣不旺未能長養萎於胞中又名僵胎亦有不足月而自下者並有不能破胞而自落者余見過數人矣若胎已長成則豈能死於腹中而不為大患至年餘而始下哉惜許君言之未詳也丹參長於行血專用能下死胎凡胎前皆宜慎用世人謂其功兼四物以之安胎因而反速其墮而人不知之余見亦多矣第三十節妊娠藥忌王孟英按凡大毒大熱及破血開竅重墜利水之藥皆為妊娠所忌便産須知歌曰蚖蚖青即青娘子斑蝥水蛭與虻蟲烏頭附子及天雄野葛水銀暨巴豆牛膝薏苡並蜈蚣三稜莪術赭石芫花麝香大戟蛇蛻黃雌雄砒石硝黃硝兼火硝芒硝牙硝黃是大黃牡丹桂槐花子同此藥涼血止血何以孕婦禁服蓋能破子宮之精血也牽牛皂角同半夏制過者不忌南星膽制陳久者不忌兼通草瞿麥乾薑桃仁木通鋼砂乾漆蟹爪甲地膽茅根與蟅蟲本草綱目續曰烏喙側子羊躑躅藜蘆茜根厚朴及薇銜檔根䕡茹葵花子赤箭莽草刺蝟皮鬼箭紅花蘇方木麥蘗常山蒺藜蟬錫粉硇砂紅娘子即葛上亭長硫黃石蠶並蜘蛛螻蛄衣魚兼蜥蜴桑蠹飛生暨樗雞牛黃犬兔驢馬肉鰌鱓蝦蟆鱉共龜余又補之曰甘遂沒藥破故紙延胡商陸五靈脂薑黃葶藶穿山甲歸尾靈仙樟腦續隨王不留行龜鱉甲麻黃川椒神曲伏龍肝珍珠犀角車前子赤芍丹參蔚茺蔚即益母草射干澤瀉澤蘭紫草郁金土瓜根滑石自犀角至此雖非傷胎之藥然系行血通竅之品皆能滑胎凡胎元不足及月分尚少者究宜審用余性謹慎故用藥如是設有故無殞不在此例及紫葳即凌霄花又外科全生集云娠婦患瘡瘍雖膏藥不宜擅貼恐內有毒藥能墮胎也夫外治尚宜避忌況內服乎故婦人善飲火酒者每無生育以酒性熱烈能消胎也附及之以為種玉者告
