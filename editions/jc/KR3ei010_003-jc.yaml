body:
  text: 卷下第一節臨產徐藹輝曰濟生產經曰胎前之脈貴實產後之脈貴虛胎前則順氣安胎產後則扶虛消瘀此其要也丹溪云產後脈洪數產前脈細小澀弱多死懷妊者脈主洪數已產而洪數不改者多主死楊子建十產論一曰正產二曰傷產未滿月而痛如欲產非果產也名為試月遽爾用力是謂傷產三曰催產正產之候悉見而難產用藥催之是謂催產四曰凍產冬產血凝不生五曰熱產過熱血沸令人昏暈六曰橫產兒身半轉遽爾用力致先露手令穩婆推足入腹七曰偏產兒未正而用力所致八曰礙產兒身已順不能生下或因臍帶絆肩令穩婆撥之九曰坐產急於高處系一手巾令母攀之輕輕屈足坐身可產十曰盤腸產臨產母腸先出然後兒生產後若腸不收用醋半盞新汲水七分和勻噀產母面每噀一縮三噀盡收孕婦只覺腹痛未必遽產連腰痛者為將產胞系於腎故也凡腰腹痛試捏產母手中指中節或本節跳動方可臨盆即產王孟英按中指跳動亦有不即產者更有腰腹不甚痛但覺酸墜而即產者兒未生時頭本在上欲生時轉身向下故腹痛難忍此時婦當正身寬帶仰臥待兒頭到了產戶方可用力催下若用力太早或束肚倚著兒不得轉身即有橫生逆生手足先出之患許叔微曰有產累日不下服藥不驗此必坐草太早心懼而氣結不行也經云恐則氣下恐則精怯怯則上焦閉閉則氣逆逆則下焦脹氣乃不行得紫蘇飲一服便產方見子懸門王孟英按難產自古有之莊公寤生見於左傳故先生如達不坼不副詩人以為異徵但先生難而後生易理之常也晚嫁者尤可察焉然頗有雖晚嫁而初產不難者非晚嫁而初產雖易繼產反難者或頻產皆易間有一次甚難者有一生所產皆易有一生所產皆難者此或由稟賦之不齊或由人事之所召未可以一例論也諺云十個孩兒十樣生至哉言乎若得兒身順下縱稽時日不必驚惶安心靜俟可耳會稽施圃生茂才誕時其母產十三日而始下母子皆安世俗不知此理稍覺不易先自慌張近有狡黠穩婆故為恫嚇要取重價臠而出之索謝以去奈貿貿者尚誇其手段之高附識於此冀世人之憬然悟但有一種騾形者交骨如環不能開坼名鎖子骨能受孕而不能產如懷娠必以娩難死此乃異稟萬中不得其一如交骨可開者斷無不能娩者也方書五種不孕之所謂螺者即騾字訛也蓋驢馬交而生騾純牝無牡其交骨如環無端不交不孕稟乎純陰性極馴良而善走勝於驢馬然亦馬之屬也易曰坤為馬行地無疆利牝馬之貞皆取象於此之謂也人賦此形而不能安其貞則厄於娩矣催產神方治胎漿已出胎不得下或延至兩三日者一服即產屢用有效當歸四錢人參一錢牛膝二錢川芎一錢龜板三錢赫石三錢研肉桂一錢去皮益母二錢水煎服王孟英按此方極宜慎用夏月尤忌必審其確係虛寒者始可服之通津玉靈湯最妙余用豬肉一味煎清湯服亦甚效附神驗保生無憂散婦人臨產先服一二劑自然易生或遇橫生倒產甚至連日不生速服一二劑應手取效當歸酒洗一錢五分川貝母一錢黃耆八分白芍酒炒一錢二分冬月用一錢菟絲子一錢四分厚朴薑汁炒七分艾葉七分荊芥穗八分枳殼炒六分川芎一錢三分羌活五分甘草五分水二杯姜二片煎至八分空腹溫服程氏方解此方流傳海內用者無不響應而制方之妙人皆不得其解予謂孕婦胎氣完固腹皮緊窄氣血裹其胞胎最難轉動此方用撐法焉歸芎白芍養血活血者也厚朴去瘀血者也用之撐開血脈羌活荊芥疏通太陽將背後一撐太陽經脈最長太陽治而諸經皆治枳殼疏理結氣將面前一撐艾葉溫暖子宮撐動子宮則胞胎靈動川貝菟絲最能運胎順產大具天然活潑之趣矣此真無上良方云云如神散路上草鞋一雙名千里馬取鼻梁上繩洗淨燒灰童便和酒調下三錢神驗武叔卿濟陰綱目云於理固難通於用實靈驗沈堯封曰千里馬得人最下之氣佐以童便之趨下酒性之行血故用之良驗此藥不寒不熱最是穩劑王孟英按催生藥不宜輕用胎近產門而不能即下始可用之又須量其虛實或補助其氣血或展拓其機關寒者溫行熱者清降逆者鎮墜未可拘守成方而概施也婦人良方曰加味芎歸湯入龜板治交骨不開醋油調滑石塗入產門為滑胎之聖藥花蕊石散治血入胞衣脹大不能下或惡露上攻蓖麻子治胎衣不下佛手散治血虛危證清魂散治血暈諸證失笑散治惡露腹痛不省人事徐藹輝曰佛手散亦下死胎胎死宜先服此不傷氣血服此不下次用平胃散加朴硝可也凍產治驗劉復真治府判女產死將殮取紅花濃煎扶女於凳上以綿帛蘸湯罨之隨以澆帛上以器盛之又暖又淋久而甦醒遂產一男蓋遇嚴冬血凝不行得溫故便產也逆產足先出用鹽塗兒足底橫產手先出塗兒手心徐藹輝曰鹽螫手足痛便縮入俗乃謂之討鹽生也第二節胞衣不下急以物牢扎臍帶墜住使不上升然後將臍帶剪斷使血不入胞萎縮易下若未系先斷胞升湊心必死徐藹輝曰保生錄云覺胎衣不下產婦用自己頭髮塞口中打一噁心即下切須放心不可驚恐不可聽穩婆妄用手取多致傷生又以草紙燒煙燻鼻即下芒硝三錢童便沖服立效俞邃良先生目睹松郡一老穩婆包醫是證自帶白末藥一包買牛膝二兩同煎去渣沖童便半杯服立下沈堯封曰白末藥定是玄明粉玄明粉即制朴硝也第三節產後喜笑不休一老嫗云產後被侍者挾落腰子使然用烏梅肉二個煎湯服立效嘉郡錢鄰哉目睹第四節惡露過多不止伏龍肝二兩煎湯澄清化入阿膠一兩服如不應加人參第五節惡露不來輕則艾葉及奪命散重則無極丸寒凝者肉桂紅花等藥並花蕊石散王孟英按產後苟無寒證的據一切辛熱之藥皆忌惡露不來腹無痛苦者勿亂投藥餌聽之可也如有疼脹者只宜丹參丹皮玄胡滑石益母草山楂澤蘭桃仁歸尾通草之類為治慎毋妄施峻劑生化湯最弗擅用第六節九竅出血匯補云九竅出血死證恆多惟產後瘀血妄行九竅出血有用逐瘀之藥而得生者不可遽斷其必死此是閱歷後之言不可忽略雖無方藥其法已具第七節黑氣鼻衄郭稽中雲產後口鼻黑氣起及鼻衄者不治蓋陽明為經脈之海口鼻乃陽明所見之部黑氣鼻衄是營衛散亂營氣先絕故不治薛立齋云急用二味參蘇飲加附子亦有得生者第八節眩暈昏冒去血過多者宜重用阿膠水化略加童便服去血不多者宜奪命散沒藥去油二錢血竭一錢共研末分兩服糖調酒下沈堯封曰此條宜與前惡露過多二條參看堯封又曰錢姓婦產後發暈兩目不醒產時惡露甚少暈時惡露已斷伊夫向鄰家討琥珀散一服約重二錢許酒調灌下即醒其藥之色與香俱似沒藥大約即是血竭沒藥之方堯封又曰庚辰春呂姓婦分娩次日患血暈略醒一刻又目閉頭傾一日數十發其惡露產時不少但亦不斷脈大左關弦硬用酒化阿膠一兩沖童便服是夜暈雖少減而頭汗出少腹痛有形寒戰如瘧戰已發熱更甚投沒藥血竭奪命散二錢酒調服寒熱腹痛發暈頓除惟嫌通身汗出此是氣血已通而現虛象用黃耆五錢炒歸身二錢甘草一錢炒棗仁三錢炒小麥五錢大棗三個煎服汗止而安王孟英按惡露雖少而胸腹無苦者不可亂投破瘀之藥今秋周鶴庭室人新產而眩暈自汗懶言目不能開乃父何新之視脈虛弦浮大因拉余商治詢其惡露雖無而脘腹無患乃用牡蠣石英龜板鱉甲琥珀丹參甘草小麥大棗為劑覆杯即減數日霍然此由血虛有素既娩則營陰下奪陽越不潛設泥新產瘀沖之常例而不細參脈證則殺人之事矣第九節發狂譫語惡露不來者是血瘀宜無極丸惡露仍通者是痰迷宜六神湯半夏曲一錢橘紅一錢膽星一錢石菖蒲一錢茯神一錢旋覆花一錢水煎濾清服沈堯封曰一成衣婦產後半月餘發狂打罵不休其夫鎖之磨上余付無極丸六錢分兩服酒下服畢即愈越四五日復發又與六服後不復發堯封又曰丁姓婦產後神昏譫語如狂惡露仍通亦不過多醫者議攻議補不一金尚陶前輩後至診畢曰待我用一平淡方吃下去看用杜橘紅石菖蒲等六味一劑神氣清四劑霍然此方想是屢驗故當此危證絕不矜持歸語舍弟賡虞答曰此名六神湯余未考其所自堯封又曰甲戌孟春錢香樹先生如君產後微熱痞悶時時譫語惡露不斷余用理血藥不應改用六神湯四劑病去如失第十節不能語武叔卿曰熱痰迷心使然膽星一錢橘紅一錢半夏一錢五分石菖蒲一錢鬱金一錢水煎入竹瀝一調羹生薑汁三小茶匙服沈堯封曰神昏不語有虛有實當參旁證及脈第十一節聲啞此屬腎虛補腎之中宜兼溫通元生地四錢茯苓二錢山藥一錢五分炒歸身二錢肉桂五分遠志肉五分炒水煎服第十二節呃逆虛脫惡候人參送黑錫丹十全一二徐藹輝曰姜用川採萃一冊載黑鉛乃水之精入北方壬癸凡遇陰火沖逆真陽暴脫氣喘痰鳴之急證同桂附回陽等藥用之立見奇功即經云重劑是也又曰姜又載何惟丹先生呃逆治驗方云傷寒呃逆聲聞數家者用刀豆子數粒瓦上煅存性為末白湯調下二錢立止又本草綱目云病後呃逆刀豆連殼燒服姜云此方宜入旋覆代赭石湯第十三節喘沈堯封曰喘有閉脫二證下血過多者是脫證喉中氣促命在須臾方書雖有參蘇飲一方恐不及待惡露不快者是閉證投奪命丹可定如不應當作痰治此皆急證更有一種緩者樓全善所云產後喘者多死有產二月洗浴即氣喘坐不得臥者五月惡風得暖稍緩用丹皮桃仁桂枝茯苓乾薑枳實厚朴桑皮紫蘇五味栝蔞煎服即臥其疾如失作汙血感寒治也按此亦是痰證所以能持久痰滯陽經所以惡寒方中著力在栝蔞厚朴熾實桂枝茯苓乾薑五味數味余皆多贅第十四節發熱沈堯封曰產後發熱所因不同當與證參看感冒者鼻塞亦不可過汗經有奪血無汗之禁只宜芎歸湯停食者噯腐飽悶宜平劑消食血虛發熱無別證者脈大而芤宜歸耆陰虛者煩渴脈細宜生地阿膠更有一種表熱裡寒下利清穀煩渴惡熱脈微細者此少陰危證宜四逆湯王孟英按暴感發熱可以鼻塞驗之苟胎前伏邪娩後陡發者何嘗有頭疼鼻塞之形證乎雖脈亦有不即顯露者惟舌苔頗有可徵或厚白而膩或黃膩黃燥或有黑點或微苔舌赤或口苦或口渴或胸悶或溲熱此皆溫濕暑熱之邪內蘊世人不察再飲以糖酒生化湯之類則輕者重而重者危不遇明眼人亦但知其產亡而不知其死於何病誤於何藥也我見實多每為太息其後條之乍寒乍熱亦當如是諦察庶免遺人夭殃也第十五節乍寒乍熱仲景曰病有灑淅惡寒而復發熱者陽脈不足陰往乘之陰脈不足陽往乘之武叔卿曰血閉於陽經榮衛之行不通則寒血閉於陰經榮衛之行不通則熱必瘀通而後寒熱自已沈堯封曰後條是瘀血前條是陰陽相乘甚則俱有戰慄者治瘀血宜奪命丹調補陰陽輕則歸耆建中重則桂附八味第十六節頭汗王海藏云頭汗出至頸而還額上偏多蓋額為六陽之會由虛熱熏蒸而出也沈堯封曰汗出不止屬氣血兩虛炒黃耆五錢酒炒白芍三錢歸身二錢炒棗仁二錢炙甘草一錢炒小麥三錢南棗肉三錢煎服神效與眩暈條呂姓婦一案參證第十七節泄瀉滯下沈堯封曰乙亥初夏傅木作婦產時去血過多隨寒戰汗出便瀉不止余用大劑真武乾薑易生薑兩劑戰少定而汗瀉如故又服兩日寒戰復作余用補中湯去人參加附子兩劑病者云我肚裡大熱口渴喜飲然汗出下利寒戰仍不減正凝神思慮間其母曰彼大孔如洞不能收閉諒無活理余改用黃耆五錢炒北五味四錢搗白芍三錢炒歸身一錢五分炒甘草一錢五分炒茯苓二錢大棗三個一劑病減四劑而愈王孟英曰觀此案則可見氣虛不能收攝者宜甘溫以補之酸澀以收之不可用辛熱走泄以助火而食氣也堯封又曰鄒氏婦產後便泄余用參附溫補藥未效新城吳敬一診云虛寒而兼下陷用補中益氣加熟地茯苓桂附應手取效以是知方論內言下虛不可升提不盡然也堯封又曰陸姓婦產後三日發疹細而成粒不稀不密用荊芥蟬蛻鼠黏子等藥一劑頭面俱透越一日漸有回意忽大便溏泄數次覺神氣不寧問其所苦曰熱曰渴語言皆如抖出脈虛細數有七至我師金大文診之曰此陽脫證也屬少陰用生附子三錢水洗略浸切片熯如炒米色炮姜八分炒甘草一錢炒白芍一錢五分水煎衝入童便一調羹青魚膽汁四小茶匙因夜中無豬膽故以此代羊膽亦可服畢即睡覺來熱渴俱除續用黃耆建中湯加丹參蘇木二劑而安沈堯封曰產婦惡露不行余血滲入大腸洞泄不禁或下青黑物的奇散極驗荊芥大者四五穗於盞內燃火燒成灰不得犯油火入麝香少許研勻沸湯一兩呷調下此藥雖微能愈大病慎弗忽視千金膠蠟湯治產後利黃蠟二棋子大阿膠二錢當歸二錢半黃連三錢黃柏一錢陳米半升煎湯煎藥服第十八節便秘金匱云亡津液胃燥故也沈堯封曰當用當歸肉蓯蓉生首烏麻仁杏仁不應用麻仁丸四五十丸第十九節頭痛沈堯封曰陰虛於下則陽易上升致頭痛者童便最妙褚侍中雲童便降火甚速降血甚神故為療厥逆頭疼之聖藥若血虛受風宜一奇散即芎歸湯也薛立齋案載一產婦頭痛日用補中益氣已三年稍勞則惡寒內熱擬作陽虛治加附子一錢於前湯中數劑不發第二十節胃脘痛腹痛少腹痛沈堯封曰有血瘀血虛停食感寒肝氣之異手按痛減者血虛也按之痛增者非停食即瘀血停食則右關脈獨實且有噯餔氣瘀血則所下惡露必少得熱即減者感寒也至若厥陰肝脈抵小腹挾胃又為藏血之臟血去肝虛其氣易動一關氣惱陡然脘腹大痛治法血虛宜歸耆建中消食惟楂肉炭最妙兼和血也消瘀宜奪命散感寒者輕則炮薑艾葉重則桂附茱萸肝氣作痛養血藥中加川楝橘核苦以泄之重則烏梅辛散酸收苦泄並用徐藹輝曰一婦產後腹痛令其夫以手按之小腹痛尤甚下惡露而痛仍不減知其非瘀乃燥屎也予藥一劑大便潤下而愈姜用川治驗炮姜五分丹皮二錢歸身三錢川芎一錢五分山楂二錢炒枳殼一錢五分炒麻仁二錢杵爛桃仁泥二錢生地二錢炙甘草四分加研爛松子仁五粒蕭賡六曰下血過多肝經血少腹痛其脈弦者以熟地萸肉為君加白芍木瓜蒺藜一劑可止有難產久坐風入胞門致腹痛欲絕其脈浮而弦續斷一兩防風五錢服之立愈第二十一節腹中虛痛胸項結核薛立齋案載一產婦腹中有物作痛投破氣行血藥尤甚肢節胸項各結小核隱於肉裡此肝血虛也蓋肝為藏血之臟而主筋血虛則筋急而攣見於肢節胸項者以諸筋皆屬於節而胸項又肝之部分也用八珍逍遙歸脾加減治驗第二十二節小腹痛瘀血成膿薛立齋案載一產婦小腹作痛行氣破血不應脈洪數此瘀血成膿也用瓜子仁湯二劑痛止更以太乙膏下膿而愈產後多有此證雖非癰用之神效脈洪數已有膿脈但數微有膿脈遲緊但有瘀血尚未成膿下血即愈若腹脹大轉側作水聲或膿從臍出或從大便出宜用蠟礬丸太乙膏及托裡散凡瘀血宜急治緩則化為膿難治若流注關節則患骨疽失治多為壞證王孟英按古今醫案按載一婦產後惱怒左少腹結一塊每發時小腹脹痛從下攻上膈間乳上皆痛飲食入胃即吐遍治不效葉香岩用炒黑小茴一錢桂酒炒當歸二錢自制鹿角霜菟絲子各一錢五分生楂肉三錢川芎八分水煎送阿魏丸七分八劑而愈次用烏雞煎丸原方半料永不復發俞東扶云消積之方如桃仁煎用大黃虻蟲芒硝東垣五積丸俱用川烏巴霜局方聖散子三稜煎丸俱用硇砂乾漆此皆峻厲之劑用而中病固有神效若妄試輕嘗鮮不敗事試閱葉案積聚門並無古方狠藥如千金硝石丸人參硝黃並用丹溪猶以為猛劑學者但將丹溪治積聚諸案細繹自有悟處而黑神丸生熟漆並用尤勿輕試每見服之誤事因思漆身為癩之言則飛補之說其可惑乎第二十三節腰痛大全云產後惡露方行忽然斷絕腰中重痛下注兩股痛如錐刺入骨此由血滯經絡不即通之必作癰疽宜桃仁湯五香連翹湯沈堯封曰前方不穩不若用桃仁紅花地龍肉桂沒藥當歸為妥如神湯治瘀血腰痛延胡當歸肉桂等分水煎服沈堯封曰腰痛不見前證者多屬肝腎虛宜當歸杜仲補骨脂之類第二十四節遍身疼痛薛立齋云以手按之痛甚者血滯也按之痛緩者血虛也第二十五節浮腫沈堯封曰產後浮腫先要分水病氣病水病皮薄色白而亮如裹水之狀氣病皮厚色不變經云腎者胃之關也關門不利聚水生病蓋產後腎氣必損胃底陽微不能蒸布津液通調水道此聚水之由也宜腎氣湯丸是證皮薄色白可證人身營衛之氣通則平滯則脹頑痰瘀血皆能阻滯氣道作腫是證皮厚色不變以脈弦者為痰脈結而芤者為血分證分別論治用藥更有一種血虛而致氣滯者其腫不甚色帶淡黃宜歸身為君佐以白朮陳皮茯苓之類第二十六節咳嗽沈堯封曰一婦妊七八個月痰嗽不止有時嘔厚痰數碗授二陳旋覆不應用清肺滋陰愈甚遂不服藥彌月而產痰嗽如故日夜不寐三朝後二陳加膽星竹瀝吐厚痰數碗嗽仍不止更用二陳加旋覆當歸少減稍可吃飯因嗽不減痰漸變薄加入生地四錢食頓減嗽轉甚通身汗出脈象微弦用歸身三錢茯苓二錢炒甘草一錢紫石英三錢因汗欲用黃耆因嗽不止推敲半晌仍用炒黃耆三錢一服汗止而嗽亦大減十劑而安第二十七節口眼喎斜丹溪云必須大補氣血然後治痰當從左右手脈分氣血多少治之切不可作中風治用小續命湯治風之藥第二十八節腰背反張薛立齋云產後腰背反張肢體抽搐因亡血過多筋無所養使然大補氣血多保無虞若發表祛風百不全一武叔卿雲寒主收引背項強直寒在太陽經也諸家皆主續命湯此古法也郭氏不問產後虛實邪之有無概用續命似覺一偏至薛氏專主亡血過多非十全大補不可是或一見乃夷堅志謂以大豆紫湯獨活湯而愈亦主於風矣是續命固不為妄也但本方有麻黃附子氣血兩虛人不可輕用而郭氏論又囑人速灌取汗而解偏不以麻黃為忌何也二說俱不可廢臨診時詳之沈堯封曰仲景論腰背反張為痙無汗者為剛痙主以葛根湯有汗者名柔痙主以桂枝加葛根湯桂枝湯乃治中風主方故有汗之痙屬風葛根湯中用麻黃麻黃乃散寒主藥故無汗之痙屬寒仲景治少陰傷寒未見吐衄之裡證者用麻黃附子細辛湯麻黃附子甘草湯微發汗蓋寒邪乘少陰之虛而欲入急以附子保坎中之陽而以麻黃散外感之寒真神方也小續命湯雖非仲景之制方中用此二味正見攻守相須之妙而叔卿反云麻附二味氣血兩虛者不可輕用假使除卻麻黃何以散客寒除卻附子何以保真陽特不可用於有汗之柔痙耳有汗柔痙更有兩種一則因虛而受外來之風一則血虛則筋急並無外感之風有風者雖汗出必然惡風主以華元化愈風散只血虛而無風者必不惡風純宜補血堯封又曰人身氣血之外更有真陽真陰藏在坎中亦立命之根基胎繫於腎腎司二陰產育之時下焦洞闢坎中陰陽有不大損者乎況背後夾脊四行俱太陽經脈太陽之裡即是少陰脊裡一條是督脈亦隸少陰此脈急縮與少陰大有關會此用麻兼用附之深意也使置此不講徒執氣虛血虛以治產後百病業醫亦覺太易矣小續命湯治產後中風身體緩急或頑痹不仁或口眼喎斜牙關緊急角弓反張防風一錢麻黃去節黃芩白芍人參川芎防己肉桂各七分附子炮杏仁各五分甘草四分炙加生薑水煎服華佗愈風散治產後中風口噤牙關緊閉手足瘛瘲如角弓狀亦治產後血暈不省人事四肢強直或心眼倒築吐瀉欲死此藥清神氣血脈其效如神荊芥略炒為末每服三錢黑豆淬酒調服童便亦可口噤揠開灌之或吹鼻中李瀕湖曰此方諸書盛稱其妙姚僧垣集驗方以酒服名如聖散藥下可立效陳氏方名舉卿古拜散蕭存敬方用古老錢煎湯服名一捻金許叔微本事方云此藥委有奇效一產婦睡久及醒則昏昏如醉不省人事醫用此藥及交加散云服後當睡必以左手搔頭用之果然昝殷產寶方云此病多因怒氣傷肝或憂氣內郁或坐草受風而成宜服此藥戴氏證治要訣名獨行散賈似道悅生堂隨抄呼為再生丹指迷方加當歸等分沈堯封曰丁丑三月練塘金虞旬第四媳產後變證伊郎來請先述病狀云上年十月生產甚健至十二月初旬面上浮腫驅風不應加麻黃三帖通身脹腫小便不利更用五皮雜治反加臍凸更用肉桂五苓小便略通脹亦稍減續用桂附八味其腫漸消惟右手足不減忽一日口眼歪斜右手足不舉舌不能言因作血虛治變為俯不得仰數日後吐黑血盈盂吐後俯仰自如旬余復不能仰又吐黑血而定投以消瘀忽然口閉自開如脫狀伊母一夜煎人參三錢灌之得醒醒來索飯吃一小杯近日又厥灌人參不醒已三晝夜矣余遂往診右手無脈因腫極不以為怪左脈浮取亦無重按則如循刀刃余曰此是實證停參可醫遂用膽星半夏石菖蒲橘皮天蟲地龍紫草水煎入竹瀝薑汁一劑知四劑手足能舉不換方十二劑能出外房診脈諸病悉退惟舌音未清仍用前方而愈金問奇病之源余曰人身臟腑接壤受胎後腹中遂增一物臟腑之機栝為之不靈五液聚為痰飲故胎前病痰滯居半千金半夏茯苓湯所以神也至臨產時痰涎與惡血齊出方得無病若止血而痰飲不下諸病叢生故產後理血不應六神湯為要藥此證初起不過痰飲阻滯氣道作腫血本無病用五苓腎氣腫減者痰滯氣道得熱暫開故也久投不已血分過熱致吐血兩次至若半身不遂口眼歪斜舌絡不靈俱是痰滯經絡見證即厥亦是痰迷所致並非虛脫故消痰通絡病自漸愈何奇之有王孟英按此等卓識皆從閱歷而來朱生甫令郎仲和之室娩後患此醫治不能除根再產亦然延已數年繼復懷妊病發益頻余用大劑滌痰藥服月餘產後安然病根竟刈沈堯封曰震澤一婦產後十餘日延我師金大文診視余從據述新產時證似虛脫服溫補藥數劑近日變一怪證左邊冷右邊熱一身四肢盡然前後中分冷則如冰熱則如炭鼻亦如之舌色左白右黑師問曰此是何病用何方治余曰書未曾載目未曾睹不知應用何方師曰奇證當於無方之書求之經不云乎左右者陰陽之道路也陰陽者水火之徵兆也敗血阻住陰陽升降道路不能旋轉陽盛處自熱陰盛處自寒所以偏熱偏寒用澤蘭楂肉劉寄奴蘇木桃仁琥珀等藥兩劑病熱減半繼服不應遂更醫雜治以致不起由今思之此證不但血阻必兼痰滯我師見及阻住陰陽升降道路病源已經識出特跳不出產後消瘀圈子耳倘通瘀不應即兼化痰或者如前案金婦得起未可知也此時彭尚初學我師見識過人特未悟徹血滯一證惜哉薛立齋案郭茂恂嫂金華君產七日不食始言頭痛頭痛已又心痛作既而目睛痛如割刺更作更止相去無瞬息間每頭痛欲取大石壓良久漸定心痛作則以十指抓胸血流滿掌痛定目復痛復以兩手自剜目如是十日不已眾醫無計進黑龍丹半粒疾少間中夜再服乃瞑日寢如平時至清晨下一行約三升許如蝗蟲子病減半已刻又行如前痛盡除黑龍丹治產難及胞衣不下血迷血暈不省人事一切危急惡候垂死者但灌藥得下無不全活當歸五靈脂川芎良薑熟地各二兩銼碎入炒鍋內紙筋鹽泥固濟火煅過百草霜一兩硫黃乳香各二錢琥珀花蕊石各一錢為細末醋糊丸如彈子大每用一二丸炭火煅紅投入生薑自然汁中浸碎以童便合酒調灌下第二十九節小便不通產乳集用鹽填臍中令平蔥白搗鋪一指厚安鹽上以艾炷餅上灸之覺熱氣入腹內即通最靈沈堯封曰此法不效必是氣虛不能升舉黃耆補氣之中已寓上升之性用以為君五錢麥冬能清上源用以為臣一錢五分白通草達下用以為佐八分水煎服一劑可效第三十節尿血大全曰產婦尿血面黃脅脹少食此肝木乘脾土也用加味逍遙散補中湯煎服可愈第三十一節尿胞被傷小便淋瀝丹溪曰嘗見收生者不謹損破產婦尿脬致病淋漓遂成廢疾有一婦年壯難產得此因思肌肉破傷在外者皆可補完脬雖在裡諒亦可治遂診其脈虛甚予曰難產之由多是氣虛產後血氣尤虛試與峻補因以參耆為君芎歸為臣桃仁陳皮茯苓為佐以豬羊脬煎湯極飢時飲之但劑小率用一兩至一月而安蓋令氣血驟長其脬自完恐少緩亦難成功矣又產時尿胞被傷小便淋瀝用二蠶繭燒存性為末服一月可愈此繆德仁治驗第三十二節產後玉門不閉薛立齋云氣血虛弱十全大補湯主之第三十三節玉門腫脹焮痛薛立齋云是肝經虛熱加味逍遙散主之坐草過早產戶傷壞紅腫潰爛痛不可忍用蒸包子籠內荷葉煎湯洗日三次兩日可愈此繆德仁治驗第三十四節陰脫子宮下墜陳無擇云產後陰脫如脫肛狀及陰下挺出逼迫腫痛舉動房勞即發清水續續小便淋瀝硫黃烏賊骨各二兩五味子二錢半為末摻之日三次丹溪云一婦產子後陰戶下一物如合缽狀有二歧其夫來求治予思之此子宮也必氣血弱而下墜遂用升麻當歸黃耆幾帖與之半日後其夫復來云服二次後覺響一聲視之已收入陰戶但因經宿幹著席上破一片如掌心大者在席某妻在家哭泣恐傷破不復能生予思此非腸胃乃脂膜也肌肉破尚可復完若氣血充盛必可生滿遂用四物湯加人參與百帖三年後復有子黃耆一錢半人參一錢當歸七分升麻三分甘草二分作一帖水煎食前服治子宮下墜外用五倍子末泡湯洗又用末敷之如此數次宜多服藥永不下第三十五節產戶下物丹溪云一婦三十餘歲生女二日後產戶下一物如手帕下有帕尖約重一斤予思之此因胎前勞乏傷氣或肝痿所致卻喜血不甚虛耳其時歲暮天寒恐冷干壞了急與炙黃耆二錢人參一錢白朮五分當歸一錢半升麻五分三帖連服之即收上得汗通身方安但下翳沾席處乾者落一片約五六兩重蓋脂膜也食進得眠診其脈皆澀左略弦視其形卻實與白朮白芍各半錢陳皮一錢生薑一片煎二三帖以養之第三十六節水道下肉線一產後水道中下肉線一條長三四尺動之則痛欲絕先服失笑散數帖次以帶皮姜三斤研爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道邊以前姜薰之冷則熨之六日夜縮其大半二六日即盡入再服失笑散芎歸湯調理之如肉線斷則不可治矣第三十七節乳汁不通湧泉散山甲炮研末酒服方寸匕日二服外以油梳梳乳即通見經疏陳自明婦人良方曰予婦食素產後七日乳汁不行赤小豆一升煮粥食之當夜即行一婦乳汁不行煎當歸八錢服即通王不留行白通草穿山甲是要藥第三十八節回乳無子吃乳乳不消令人發熱惡寒用大麥芽二兩炒為末每服五錢白湯下丹溪第三十九節乳頭碎裂丹溪云老黃茄子燒灰敷之綱目云丁香末敷之第四十節吹乳繆仲淳云妒乳內外吹乳乳岩乳癰不外陽明厥陰兩經之病橘葉最妙又用生半夏一個研末生蔥頭一段研裹左右互塞鼻神驗又于山中掘野芥菜去葉用根洗淨搗爛無灰酒煎數滾飲一二次即以渣罨患處凡乳癰未成或腫或硬或脹痛者無不立消屢次經驗野芥菜一名天芥菜又名鸚哥草似芥菜而略矮小其根數出如蘭根用以治乳想其形似乳囊也故用有驗春甫附載第四十一節乳癰紅腫方發活小鯽魚一尾剖去腸同生山藥寸許搗爛塗之少頃發癢即愈屢驗無山藥即芋艿亦可第四十二節乳癰已成胡桃膈瓦上焙燥研末每服三錢紅糖調勻溫酒送下三服無不全愈又方用玫瑰花五七朵乾者亦可醇酒煎服燙酒極熱沖服亦可並以花瓣摘散鋪貼患處三兩次可愈即已成塊硬者亦可消散曾經活驗數人陳載安附識第四十三節乳岩坎氣洗淨切薄焙燥研末日吃一條酒下約二十條效此繆德仁治驗半年以內者效又狗糞東丹獨囊蒜三味搗勻攤布上勿用膏藥令黏貼上微痛數日可愈沈堯封曰乳岩初起堅硬不作膿其成也肌肉疊起形似山岩病起抑鬱不治之證方書云桃花開時死出鮮血者死余見一婦患此已四年診時出鮮血盈盂以為必死日服人參錢許竟不死明年春桃花大放仍無恙直至秋分節候方斃此婦抑鬱不得志誠是肝病然不死於春而死於秋何哉豈肝病有二其太過者死於旺時其不及者死於衰時耶此證本屬肝病繆以坎氣補腎而愈亦理之不可解者王孟英按吳鞠通云當歸芎藭為產後要藥然惟血寒而滯者為宜若血虛而熱者斷不可用蓋當歸香竄異常甚於麻辛急走善行不能靜守止能運血裒多益寡如亡血液虧孤陽上冒等證而欲望其補血不亦愚哉芎藭有車輪紋其性更急於當歸蓋特性之偏長於通者必不長於守也世人不敢用芍藥而恣用歸芎何其顛倒哉余謂今人血虛而熱者為多產後血液大耗孤陽易浮吳氏此言深中時弊又論達生編所用方藥未可盡信先得我心之同然者詳見解產難醫者宜究心焉第四十四節熱入血室仲景傷寒論云婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈又云婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實瀉之又云婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之沈堯封曰論言勿犯胃氣及上二焦者謂不可攻下並不可吐汗也然有似是實非之證不可不辨陳良甫曰脈遲身涼而胸脅下滿如結胸狀譫語者當刺期門穴下針病人五吸停針良久徐徐出針凡針期門穴必瀉勿補肥人二寸瘦人寸半許學士治一婦病傷寒發寒熱遇夜則如見鬼狀經六七日忽然昏塞涎響如引鋸牙關緊急瞑目不知人病勢危困許視之曰得病之初曾值月經來否其家云經水方來病作而經遂止後一二日發寒熱晝雖靜夜則見鬼昨日不省人事許曰此是熱入血室證醫者不曉以剛劑與之故致此當先化痰後治其熱乃急以一呷散投之兩時許涎下得睡即省人事次投以小柴胡湯加生地二服而熱遂除不汗而自解又一熱入血室證醫用補血調氣藥治之數日遂成血結胸或勸用前藥許曰小柴胡已遲不可行矣刺期門則可請善針者治之如言而愈或問何為而成血結胸許曰邪氣乘虛入於血室血為邪所迫上入肝經則譫語見鬼復入膻中則血結於胸中矣故觸之則痛非藥可及當用刺法沈堯封曰一婦熱多寒少譫語夜甚經水來三日病發而止本家亦知熱入血室醫用小柴胡數帖病增舌色黃燥上下齒俱是乾血余用生地丹皮麥冬等藥不應藥入則乾嘔脈象弱而不大因思弱脈多火胃液乾燥所以作嘔遂用白虎湯加生地麥冬二劑熱退神清唯二十餘日不大便為苦與麻仁丸三服得便而安一室女發熱經來醫用表散藥增劇譫語夜甚投小柴胡湯不應夜起如狂或疑蓄血投涼血消瘀藥亦不應左關脈弦硬搏指詢知病從怒起因用膽草黃芩山梔丹皮羚羊角蘆薈甘草歸身等藥煎服一劑知四劑愈堯封又曰張儀表令愛發熱經來昏夜譫語如見鬼狀投小柴胡增劇詢其病情云醒時下體惡寒即憒時亦常牽被斂衣因悟此證平素必患帶下且完姻未久隱曲之事未免過當復值經來過多精血兩虧陰陽並竭其惡寒發熱由陰陽相乘所致非外感熱邪深入也誤投發散清熱證同亡陽傷寒論云亡陽則譫語內經云脫陽者見鬼是也因用腎氣丸早晚各二錢神氣即清隨以蓯蓉易附桂數劑全愈沈氏自注此即前所云似是實非之證不可不辨第四十五節咽硬金匱云婦人咽中如有炙臠半夏厚朴湯主之千金所云咽中帖帖如有炙肉吐之不出吞之不下是也半夏一升厚朴三兩茯苓四兩生薑五兩蘇葉二兩水煎分四服日三夜一第四十六節臟躁金匱云婦人臟躁悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之甘草三兩小麥一斤大棗十枚水煎分三服尤在涇曰此證沈氏所謂子宮血虛受風化熱者是也血虛臟躁則內火擾而神不寧悲傷欲哭有如神靈而實為虛病前五臟風寒積聚篇所謂邪哭使魂魄不安者血氣少而屬於心也數欠伸者經云腎為欠為嚏又腎病者善數欠顏黑蓋五志生火動必關心臟陰既傷窮必及腎也小麥為肝之谷而善養心氣甘草大棗甘潤生陰所以滋臟氣而止其躁也第四十七節陰寒金匱云婦人陰寒溫陰中坐藥蛇床子散主之蛇床子末以白粉少許和合相得如棗大綿裹納之自溫第四十八節陰吹金匱云胃氣下泄陰吹而正喧此穀氣之實也豬膏發煎主之豬膏半斤亂髮如雞子大三枚和膏中煎之發消藥成分再服王盂英按陰吹亦婦人恆有之事別無所苦者亦不為病況屬隱微之候故醫亦不知耳俗傳產後未彌月而啖蔥者必患此惟吹之太喧而大便艱燥乃稱為病然仲聖但潤其陽明之燥則腑氣自通仍不必治其吹也第四十九節陰癢附陰挺善邑西門外三里有婦陰中極癢難忍因寡居無人轉述醫者莫知病情治皆不效至蘇就葉天士診微露其意葉用蛇床子煎湯洗內服龜鹿二仙膠四日而愈陰蝕有用豬肝煮熟削如梃鑽孔數十納陰中良久取出必有蟲在肝孔內另易一如梃納之蟲儘自愈亦良法也王孟英按尚有陰挺一證用飛礬六兩即煅枯明礬桃仁一兩五味子雄黃各五錢銅綠四錢共末之煉蜜丸每重四錢即以方內雄黃為衣坐入玉門重者二次必愈第五十節女科書大略王宇泰女科證治準繩序云婦人有專治方舊矣史稱扁鵲過邯鄲聞貴婦人即為帶下醫語兼長也然帶下直婦人一病耳調經雜證懷子免身患苦百出療治萬方一帶寧遽盡之乎世所傳張長沙雜病方論三卷婦人居一焉其方用之奇驗奈弗廣何孫真人著千金方特以婦人為首蓋易基乾坤詩始關睢之義其說曰特須教子女學習此三卷婦人方令其精曉即於侖卒之秋何優畏也而精於醫者未之深許也唐大中初白敏中守成都其家有因免乳死者訪問名醫得昝殷備集驗方三百七十八首以獻是為產寶宋時濮陽李師聖得產論二十一篇有說無方醫學教授郭稽中以方附焉而陳無擇於三因方評其得失詳矣婺醫杜荍又附益之是為產育寶慶集臨川陳自明良甫以為諸書綱領散漫而無統節目簡略而未備醫者局於簡易不能深求遍覽有才進一方不效輒束手者有無方可據揣摩臆度者乃採摭諸家之善附以家傳驗方編輯成篇凡八門門數十餘體總三百六十餘論論後列方綱領節目燦然可觀是為大全良方良方出而閨閣之調治將大備矣然其論多采巢氏病源什九歸諸風冷藥偏獷熱未有條分縷析其宜否者近代薛己新甫始取良方增注其論酌寒熱之中大抵依於養脾胃補氣血不以去病為事可謂救時之良醫也已第陳氏所輯多上古專科禁方具有源流本末不可沒也而薛氏一切以己意芟除變亂使古方自此湮沒余重惜之故於是編附存陳氏之舊而刪其偏駁者然亦存十之六七而已至薛氏之說則盡收之取其以養正為主且簡而易守雖女子學習無難也若易水瀔水師弟則後長沙而精於醫者一方一論具掇是中乃他書所無有挾是而過邯鄲庶無道少之患哉其積德求子與夫安產藏衣吉凶方位皆非醫家事故削不載云王孟英按帶下婦人一病耳未必人人病此何以扁鵲聞貴婦人即為帶下醫緣帶下本女子生而即有之事原非病也後人以帶脈不主約束一言遂以女人之遺濁稱為帶下之證然則扁鵲之為帶下醫猶今之幼科自稱痘醫也痘雖幼科之一證而亦人人多有之事且世俗無不貴小兒者所以人多樂為痘醫耳
